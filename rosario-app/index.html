<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Rosario Command</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0b0b0f">
<link rel="apple-touch-icon" href="https://lunarasociety.com/rosario-avatar.png">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; padding: 0; background: #0b0b0f; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #eae6f2;
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }
  #topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px calc(14px + env(safe-area-inset-top)) 16px;
    padding-top: calc(14px + env(safe-area-inset-top));
    background: linear-gradient(180deg, #14101d 0%, #0b0b0f 100%);
    border-bottom: 1px solid rgba(190,160,255,0.15);
    flex-shrink: 0;
  }
  #topbar img { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(190,160,255,0.4); }
  #topbar .title { font-size: 16px; font-weight: 600; letter-spacing: 0.3px; }
  #topbar .status { font-size: 11px; color: #9d8fc7; display: flex; align-items: center; gap: 5px; }
  #topbar .dot { width: 7px; height: 7px; border-radius: 50%; background: #5ee6a3; box-shadow: 0 0 6px #5ee6a3; }
  #tabs { display: flex; gap: 0; background: #0b0b0f; border-bottom: 1px solid rgba(190,160,255,0.1); flex-shrink: 0; }
  .tab { flex: 1; text-align: center; padding: 10px 0; font-size: 13px; color: #7a6f96; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.active { color: #d8c9ff; border-bottom-color: #a684ff; }
  #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 82%; padding: 10px 14px; border-radius: 16px; font-size: 14.5px; line-height: 1.45; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { align-self: flex-end; background: linear-gradient(135deg,#6b46c1,#8b5cf6); color: white; border-bottom-right-radius: 4px; }
  .msg.bot { align-self: flex-start; background: #1b1726; border: 1px solid rgba(190,160,255,0.15); border-bottom-left-radius: 4px; }
  .msg.typing { align-self: flex-start; background: #1b1726; border: 1px solid rgba(190,160,255,0.15); border-bottom-left-radius: 4px; display:flex; gap:4px; padding: 14px; }
  .msg.typing span { width:6px; height:6px; border-radius:50%; background:#a684ff; animation: pulse 1.2s infinite ease-in-out; }
  .msg.typing span:nth-child(2){animation-delay:.2s} .msg.typing span:nth-child(3){animation-delay:.4s}
  @keyframes pulse { 0%,80%,100%{opacity:.3; transform:scale(.8)} 40%{opacity:1; transform:scale(1)} }
  #inputbar { display: flex; gap: 8px; padding: 10px 12px calc(10px + env(safe-area-inset-bottom)) 12px; background: #0f0c16; border-top: 1px solid rgba(190,160,255,0.15); flex-shrink: 0; }
  #inputbar textarea { flex: 1; resize: none; background: #1b1726; border: 1px solid rgba(190,160,255,0.2); border-radius: 20px; padding: 10px 16px; color: #eae6f2; font-size: 14.5px; max-height: 100px; outline: none; }
  #inputbar button { background: linear-gradient(135deg,#6b46c1,#8b5cf6); border: none; width: 42px; height: 42px; border-radius: 50%; color: white; font-size: 18px; flex-shrink: 0; }
  #inputbar button:active { transform: scale(0.93); }
  #drivepanel { flex: 1; overflow-y: auto; padding: 16px; display: none; }
  #drivepanel.active { display: block; }
  #chat.hidden, #inputbar.hidden { display: none; }
  .drive-item { display: flex; align-items: center; gap: 10px; padding: 12px; background: #1b1726; border: 1px solid rgba(190,160,255,0.12); border-radius: 12px; margin-bottom: 8px; font-size: 13.5px; }
  .empty-state { text-align: center; color: #7a6f96; font-size: 13px; margin-top: 40px; padding: 0 20px; line-height: 1.6; }
</style>
</head>
<body>
  <div id="topbar">
    <img src="https://lunarasociety.com/rosario-avatar.png" alt="Rosario">
    <div style="flex:1">
      <div class="title">Rosario</div>
      <div class="status"><span class="dot"></span><span id="statusText">Connected — Lunara Society</span></div>
    </div>
  </div>
  <div id="tabs">
    <div class="tab active" data-tab="chat">Chat</div>
    <div class="tab" data-tab="drive">Brain (Drive)</div>
  </div>
  <div id="chat"></div>
  <div id="drivepanel">
    <div class="empty-state">Drive brain integration is next in line — this tab will list and open files from the shared Google Drive directly from here.</div>
  </div>
  <div id="inputbar">
    <textarea id="input" rows="1" placeholder="Message Rosario…"></textarea>
    <button id="send">➤</button>
  </div>

<script>
const PROXY_URL = "https://superagent-d6d4ecd1.base44.app/functions/rosarioChatProxy";
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const statusText = document.getElementById('statusText');

let conversationId = localStorage.getItem('rosario_conv_id') || null;
let history = JSON.parse(localStorage.getItem('rosario_history') || '[]');

function render() {
  chatEl.innerHTML = '';
  if (history.length === 0) {
    const div = document.createElement('div');
    div.className = 'empty-state';
    div.textContent = "This is a live line to Rosario — the same brain running Lunara Society. Ask about Shield Certification applications, the site, or hand off a task.";
    chatEl.appendChild(div);
  }
  history.forEach(m => {
    const div = document.createElement('div');
    div.className = 'msg ' + m.role;
    div.textContent = m.text;
    chatEl.appendChild(div);
  });
  chatEl.scrollTop = chatEl.scrollHeight;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}
function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  history.push({ role: 'user', text });
  render();
  addTyping();
  statusText.textContent = 'Thinking…';

  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, conversation_id: conversationId })
    });
    const data = await res.json();
    removeTyping();
    if (data.conversation_id) {
      conversationId = data.conversation_id;
      localStorage.setItem('rosario_conv_id', conversationId);
    }
    history.push({ role: 'bot', text: data.reply || '…' });
    localStorage.setItem('rosario_history', JSON.stringify(history.slice(-100)));
    statusText.textContent = 'Connected — Lunara Society';
    render();
  } catch (e) {
    removeTyping();
    history.push({ role: 'bot', text: "Couldn't reach the brain — check your connection and try again." });
    render();
    statusText.textContent = 'Connection issue';
  }
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const target = tab.dataset.tab;
    document.getElementById('chat').classList.toggle('hidden', target !== 'chat');
    document.getElementById('inputbar').classList.toggle('hidden', target !== 'chat');
    document.getElementById('drivepanel').classList.toggle('active', target === 'drive');
  });
});

render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
</html>
