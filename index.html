<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lunara Society — Trust Coordination Institution</title>
<meta name="description" content="Lunara Society is the trust coordination layer between businesses and autonomous AI systems. Est. 2026.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" href="shield-logo.jpg">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#C4A46B;
  --gold-bright:#E0C080;
  --gold-dim:rgba(196,164,107,0.18);
  --black:#000;
  --black-deep:#030201;
}
html,body{
  width:100%;height:100%;
  background:var(--black-deep);
  font-family:'Inter',sans-serif;font-weight:300;
  color:#fff;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  touch-action:pan-x pan-y;
}

/* ══════════════════════════════════════════
   DESKTOP — fullscreen hall
══════════════════════════════════════════ */
#stage-desktop{
  position:fixed;inset:0;
  display:none;
}
.stage-bg{
  position:absolute;inset:0;
  background:url('hall-bg.png') center center / cover no-repeat;
  z-index:0;
}

/* Living institution — very subtle ceiling drift */
@keyframes celestialDrift{
  0%  { transform:scale(1.000) translateY(0px); }
  50% { transform:scale(1.003) translateY(-2px); }
  100%{ transform:scale(1.000) translateY(0px); }
}
.stage-bg{
  animation: celestialDrift 28s ease-in-out infinite;
  transform-origin: 50% 30%;
}

/* Floor light pulse — barely perceptible, 0→visible at 20s */
.floor-glow{
  position:absolute;
  bottom:0;left:50%;transform:translateX(-50%);
  width:60%;height:35%;
  background:radial-gradient(ellipse at 50% 100%,
    rgba(196,164,107,0.06) 0%,
    transparent 70%
  );
  z-index:1;
  animation: floorBreath 18s ease-in-out infinite;
  animation-delay: 20s;
  opacity:0;
}
@keyframes floorBreath{
  0%  { opacity:0; }
  40% { opacity:1; }
  100%{ opacity:0; }
}

/* Celestial ceiling glow — visible ~5s in */
.ceiling-glow{
  position:absolute;
  top:0;left:50%;transform:translateX(-50%);
  width:55%;height:32%;
  background:radial-gradient(ellipse at 50% 0%,
    rgba(196,164,107,0.07) 0%,
    transparent 70%
  );
  z-index:1;
  animation: ceilingPulse 22s ease-in-out infinite;
  animation-delay: 5s;
  opacity:0;
}
@keyframes ceilingPulse{
  0%  { opacity:0; }
  30% { opacity:1; }
  70% { opacity:1; }
  100%{ opacity:0; }
}

/* ══════════════════════════════════════════
   MOBILE — horizontal scroll panorama
══════════════════════════════════════════ */
#stage-mobile{
  position:fixed;inset:0;
  display:none;
  overflow-x:scroll;
  overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
#stage-mobile::-webkit-scrollbar{display:none;}

.mobile-canvas{
  position:relative;
  height:100%;
  /* Wide enough to show all 6 portals — 2.6× viewport */
  width:260vw;
  background:url('hall-bg.png') center center / auto 100% no-repeat;
  flex-shrink:0;
}

/* Swipe hint */
.swipe-hint{
  position:fixed;
  top:50%;transform:translateY(-50%);
  z-index:60;pointer-events:none;
  display:flex;align-items:center;gap:4px;
  animation:swipePulse 1.1s ease-in-out infinite alternate;
  transition:opacity 0.8s ease;
}
.swipe-hint.right{right:14px;}
.swipe-hint.left{left:14px;display:none;}
@keyframes swipePulse{
  from{opacity:0.25;}
  to{opacity:0.95;}
}
.swipe-hint svg{width:26px;height:26px;}

/* ══════════════════════════════════════════
   PORTAL INTERACTIVE LAYER
══════════════════════════════════════════ */
.portal-layer{
  position:absolute;inset:0;z-index:10;
  pointer-events:none;
}
.portal{
  position:absolute;
  pointer-events:all;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;
  transform:translate(-50%,-50%);
  /* Tap target padding for mobile */
  padding:8px;
}

/* The hit zone */
.portal-hit{
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  gap:clamp(5px,0.8vw,10px);
  width:clamp(50px,8vw,100px);
  height:clamp(70px,11vw,130px);
}

.portal-label{
  font-size:clamp(7px,0.8vw,10px);
  letter-spacing:0.25em;text-transform:uppercase;
  color:rgba(196,164,107,0);
  transition:color 0.4s, text-shadow 0.4s;
  text-align:center;white-space:nowrap;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-weight:300;
}
.portal-ring{
  width:clamp(38px,5.8vw,76px);
  height:clamp(38px,5.8vw,76px);
  border-radius:50%;
  border:1px solid rgba(196,164,107,0);
  transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
  position:relative;background:transparent;
}
.portal-ring::before{
  content:'';position:absolute;inset:-5px;
  border-radius:50%;
  border:1px solid rgba(196,164,107,0);
  transition:all 0.4s;
}

/* Portal awakens on hover */
.portal:hover .portal-label,
.portal:active .portal-label{
  color:rgba(196,164,107,0.92);
  text-shadow:0 0 16px rgba(196,164,107,0.5);
}
.portal:hover .portal-ring,
.portal:active .portal-ring{
  border-color:rgba(196,164,107,0.55);
  box-shadow:
    0 0 24px rgba(196,164,107,0.3),
    0 0 48px rgba(196,164,107,0.12),
    inset 0 0 16px rgba(196,164,107,0.06);
  background:rgba(196,164,107,0.04);
}
.portal:hover .portal-ring::before,
.portal:active .portal-ring::before{
  border-color:rgba(196,164,107,0.18);
}

/* ══════════════════════════════════════════
   FLOOR CONSOLE — 8 buttons
   Carved into the marble floor at the bottom
══════════════════════════════════════════ */
.console{
  position:absolute;
  bottom:0;left:0;right:0;
  z-index:10;
  display:flex;align-items:center;justify-content:center;
  /* Sits in the architectural footer zone of the image */
  padding-bottom:clamp(6px,2.5vh,28px);
  padding-top:clamp(4px,1vh,12px);
  pointer-events:none;
}
.console-inner{
  display:flex;align-items:center;
  gap:0;
  pointer-events:all;
  /* Width matches the floor console panel in the image */
  width:clamp(280px,88vw,1060px);
  justify-content:space-between;
  padding:0 clamp(4px,1.5vw,20px);
}
.console-btn{
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;
  gap:clamp(3px,0.5vw,6px);
  flex:1;
  padding:clamp(4px,0.8vh,10px) 0;
  position:relative;
  transition:all 0.3s;
  border-radius:2px;
  min-width:0;
}
.console-btn:hover,.console-btn:active{
  background:rgba(196,164,107,0.05);
}
/* Carve a subtle separator between buttons */
.console-btn+.console-btn::before{
  content:'';position:absolute;
  left:0;top:15%;bottom:15%;width:1px;
  background:rgba(196,164,107,0.08);
}

.console-icon{
  width:clamp(28px,4.2vw,52px);
  height:clamp(28px,4.2vw,52px);
  border-radius:50%;
  border:1px solid rgba(196,164,107,0.22);
  background:rgba(0,0,0,0.35);
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s;
  flex-shrink:0;
  /* SVG icon inside */
  overflow:hidden;
}
.console-icon svg{
  width:55%;height:55%;
  opacity:0.5;
  transition:opacity 0.3s;
}
.console-btn:hover .console-icon,
.console-btn:active .console-icon{
  border-color:rgba(196,164,107,0.6);
  background:rgba(196,164,107,0.08);
  box-shadow:0 0 16px rgba(196,164,107,0.25);
}
.console-btn:hover .console-icon svg,
.console-btn:active .console-icon svg{
  opacity:0.9;
}
.console-label{
  font-size:clamp(5px,0.65vw,8px);
  letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(196,164,107,0.35);
  transition:color 0.3s;
  white-space:nowrap;
  font-family:'Inter',sans-serif;
  overflow:hidden;text-overflow:ellipsis;
  max-width:100%;
}
.console-btn:hover .console-label,
.console-btn:active .console-label{
  color:rgba(196,164,107,0.85);
}

/* ══════════════════════════════════════════
   GLASS DOOR — ELEVATOR MODEL
   Appears CLOSED instantly on click.
   Opens only when destination is loaded.
══════════════════════════════════════════ */
#portal-door{
  position:fixed;inset:0;z-index:700;
  pointer-events:none;
  visibility:hidden;
  overflow:hidden;
}
#portal-door.armed{visibility:visible;pointer-events:all;}

.door-left,.door-right{
  position:absolute;top:0;bottom:0;width:50%;
  background:linear-gradient(170deg,
    rgba(3,2,1,0.99) 0%,
    rgba(8,6,3,0.99) 45%,
    rgba(3,2,1,0.99) 100%
  );
  /* Will-change for GPU layer */
  will-change:transform;
  transition:transform 1.05s cubic-bezier(0.76,0,0.24,1);
}
.door-left{
  left:0;
  border-right:1px solid rgba(196,164,107,0.5);
  transform:translateX(0);
}
.door-right{
  right:0;
  border-left:1px solid rgba(196,164,107,0.5);
  transform:translateX(0);
}

/* Subtle grid engraving on doors */
.door-left::before,.door-right::before{
  content:'';position:absolute;inset:0;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 56px,rgba(196,164,107,0.025) 56px,rgba(196,164,107,0.025) 57px),
    repeating-linear-gradient(90deg,transparent,transparent 76px,rgba(196,164,107,0.018) 76px,rgba(196,164,107,0.018) 77px);
}
/* Vertical gold accent line */
.door-left::after{
  content:'';position:absolute;
  right:clamp(12px,2.8vw,44px);top:8%;bottom:8%;
  width:1px;
  background:linear-gradient(to bottom,
    transparent 0%,rgba(196,164,107,0.55) 22%,
    rgba(196,164,107,0.75) 50%,
    rgba(196,164,107,0.55) 78%,transparent 100%
  );
  box-shadow:0 0 12px rgba(196,164,107,0.25);
}
.door-right::after{
  content:'';position:absolute;
  left:clamp(12px,2.8vw,44px);top:8%;bottom:8%;
  width:1px;
  background:linear-gradient(to bottom,
    transparent 0%,rgba(196,164,107,0.55) 22%,
    rgba(196,164,107,0.75) 50%,
    rgba(196,164,107,0.55) 78%,transparent 100%
  );
  box-shadow:0 0 12px rgba(196,164,107,0.25);
}

/* Engraving SVG */
.door-engraving{
  position:absolute;top:50%;transform:translateY(-50%);
  opacity:0.16;
  width:clamp(55px,7.5vw,120px);
}
.door-left .door-engraving{right:clamp(24px,4.5vw,72px);}
.door-right .door-engraving{left:clamp(24px,4.5vw,72px);}

/* Handle */
.door-handle{
  position:absolute;top:50%;transform:translateY(-50%);
  width:clamp(7px,1vw,14px);height:clamp(24px,4vw,50px);
  border:1px solid rgba(196,164,107,0.65);
  background:rgba(196,164,107,0.1);
  box-shadow:0 0 8px rgba(196,164,107,0.15);
  transition:opacity 0.35s;
}
.door-left .door-handle{right:clamp(2px,0.5vw,8px);}
.door-right .door-handle{left:clamp(2px,0.5vw,8px);}

/* Center seam */
.door-seam{
  position:absolute;top:0;bottom:0;left:50%;
  width:2px;transform:translateX(-50%);
  background:linear-gradient(to bottom,
    transparent,rgba(196,164,107,0.85) 18%,
    rgba(196,164,107,1.0) 50%,
    rgba(196,164,107,0.85) 82%,transparent
  );
  box-shadow:0 0 20px rgba(196,164,107,0.55);
  z-index:2;transition:opacity 0.4s;
}

/* OPEN */
#portal-door.open .door-left{transform:translateX(-100%);}
#portal-door.open .door-right{transform:translateX(100%);}
#portal-door.open .door-seam{opacity:0;}
#portal-door.open .door-handle{opacity:0;}

/* ══════════════════════════════════════════
   LATIN INSCRIPTION — echoes the arch text
══════════════════════════════════════════ */
.inscription{
  position:absolute;
  top:clamp(10px,3.5vh,36px);
  left:50%;transform:translateX(-50%);
  z-index:8;pointer-events:none;
  text-align:center;
  white-space:nowrap;
}
.inscription-text{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(8px,1vw,13px);
  letter-spacing:0.35em;
  text-transform:uppercase;
  color:rgba(196,164,107,0.28);
  font-style:italic;
  font-weight:300;
}

/* ══════════════════════════════════════════
   CORNER MARKS
══════════════════════════════════════════ */
.mark{
  position:absolute;z-index:8;
  font-size:clamp(6px,0.65vw,8px);
  letter-spacing:0.28em;text-transform:uppercase;
  color:rgba(196,164,107,0.22);pointer-events:none;
  font-weight:300;
}
.mark-bl{bottom:clamp(4px,1vh,12px);left:clamp(8px,1.2vw,16px);}
.mark-br{bottom:clamp(4px,1vh,12px);right:clamp(8px,1.2vw,16px);text-align:right;}

/* ══════════════════════════════════════════
   INITIAL FADE IN
══════════════════════════════════════════ */
body{opacity:0;transition:opacity 1.1s ease;}
body.ready{opacity:1;}
</style>
</head>

<script>
// ════════════════════════════════════════════════
// PORTAL DEFINITIONS
// 6 arch portals mapped to image positions
// Image: 1280×853
// Arch icons visible at approx x: 9%, 21%, 32%, 68%, 79%, 91%
// Y center of icons: ~42% from top
// ════════════════════════════════════════════════
const PORTALS = [
  { label:'Initiation',  page:'shield.html',       x:9.0,  y:43 },
  { label:'Knowledge',   page:'architecture.html', x:21.0, y:40 },
  { label:'Archives',    page:'doctrine.html',     x:32.0, y:38 },
  { label:'Legacy',      page:'registry.html',     x:68.0, y:38 },
  { label:'Society',     page:'institution.html',  x:79.0, y:40 },
  { label:'Sanctum',     page:'join.html',         x:91.0, y:43 },
];

// ════════════════════════════════════════════════
// CONSOLE BUTTON DEFINITIONS — 8 unique symbols
// Each carved into the marble floor panel
// ════════════════════════════════════════════════

// ════════════════════════════════════════════════
// BUILD PORTALS
// ════════════════════════════════════════════════
function buildPortals(layerId){
  const layer = document.getElementById(layerId);
  layer.innerHTML = '';
  PORTALS.forEach(p => {
    const el = document.createElement('div');
    el.className = 'portal';
    el.style.cssText = `left:${p.x}%;top:${p.y}%;`;
    el.innerHTML = `<div class="portal-hit">
      <span class="portal-label">${p.label}</span>
      <div class="portal-ring"></div>
    </div>`;
    el.addEventListener('click', () => navigate(p.page));
    el.addEventListener('touchend', e => { e.preventDefault(); navigate(p.page); });
    layer.appendChild(el);
  });
}

// ════════════════════════════════════════════════
// BUILD CONSOLE
// ════════════════════════════════════════════════
function buildConsole(consoleId){
  const c = document.getElementById(consoleId);
  c.innerHTML = '';
  CONSOLE.forEach(btn => {
    const el = document.createElement('div');
    el.className = 'console-btn';
    el.innerHTML = `<div class="console-icon">${btn.svg}</div><span class="console-label">${btn.label}</span>`;
    el.addEventListener('click', () => navigate(btn.page));
    el.addEventListener('touchend', e => { e.preventDefault(); navigate(btn.page); });
    c.appendChild(el);
  });
}

// ════════════════════════════════════════════════
// DEVICE INIT
// ════════════════════════════════════════════════
function isMobilePortrait(){
  return window.innerWidth < 768 && window.innerHeight > window.innerWidth;
}

const deskEl = document.getElementById('stage-desktop');
const mobEl  = document.getElementById('stage-mobile');

function initDesktop(){
  deskEl.style.display = 'block';
  mobEl.style.display  = 'none';
  buildPortals('portal-layer-desk');
  buildConsole('console-desk');
}

function initMobile(){
  deskEl.style.display = 'none';
  mobEl.style.display  = 'block';
  buildPortals('portal-layer-mob');
  buildConsole('console-mob');

  // Show swipe hint for 5s
  const sr = document.getElementById('swipe-r');
  const sl = document.getElementById('swipe-l');
  setTimeout(() => { sr.style.opacity = '0'; }, 5000);

  // Track scroll for arrows
  mobEl.addEventListener('scroll', () => {
    const canvas = document.getElementById('mobile-canvas');
    const scrolled = mobEl.scrollLeft > 40;
    const atEnd    = mobEl.scrollLeft >= canvas.offsetWidth - mobEl.offsetWidth - 40;
    sl.style.display = scrolled ? 'flex' : 'none';
    sr.style.display = atEnd   ? 'none'  : 'flex';
    sr.style.opacity = '0.9';
  }, { passive:true });
}

function init(){
  if(isMobilePortrait()) initMobile();
  else initDesktop();
}

// ════════════════════════════════════════════════
// ELEVATOR DOOR NAVIGATION
// Door appears closed instantly → page loads
// behind it → door opens → navigate for real
// ════════════════════════════════════════════════
const door = document.getElementById('portal-door');
let busy = false;

function navigate(targetPage){
  if(busy) return;
  busy = true;

  // 1. Snap door closed immediately
  door.classList.remove('open');
  door.classList.add('armed');

  // 2. Start loading the page silently
  const loader = document.createElement('iframe');
  loader.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;border:none;z-index:660;opacity:0;pointer-events:none;';
  document.body.appendChild(loader);

  let departed = false;
  function depart(){
    if(departed) return;
    departed = true;
    // Open the door — revealing the loaded page beneath
    door.classList.add('open');
    // Navigate for real after door fully opens
    setTimeout(() => {
      window.location.href = targetPage;
    }, 1100);
  }

  // Depart when iframe loaded
  loader.onload = () => setTimeout(depart, 150);

  // Safety fallback: depart after 2.8s regardless
  const fallback = setTimeout(depart, 2800);
  loader.onload = () => { clearTimeout(fallback); setTimeout(depart, 150); };

  loader.src = targetPage;
}

// ════════════════════════════════════════════════
// LOAD + ORIENTATION HANDLING
// ════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  // Reset door state on every hall load
  door.classList.remove('armed','open');
  busy = false;
  init();
  // Fade hall in
  requestAnimationFrame(() => {
    setTimeout(() => { document.body.classList.add('ready'); }, 60);
  });
});
window.addEventListener('resize', () => { if(!busy) init(); });
window.addEventListener('orientationchange', () => { setTimeout(() => { if(!busy) init(); }, 350); });
</script>
