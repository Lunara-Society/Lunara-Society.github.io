<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lunara Society — Trust Coordination Institution</title>
<meta name="description" content="Lunara Society is the trust coordination layer between businesses and autonomous AI systems. Protect your business. Declare your identity. Join the registry.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" href="shield-logo.jpg">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#C4A46B;--gold-dim:rgba(196,164,107,0.25);--gold-bright:#E0C080;
  --black:#000;--black-soft:#080604;--black-mid:#0f0d0a;
  --white:#fff;--white-90:rgba(255,255,255,0.90);--white-70:rgba(255,255,255,0.70);
  --white-50:rgba(255,255,255,0.50);--white-30:rgba(255,255,255,0.30);--white-15:rgba(255,255,255,0.15);
  --border:rgba(196,164,107,0.2);
  --glass-bg:rgba(0,0,0,0.72);
  --glass-border:rgba(196,164,107,0.35);
}
html,body{
  width:100%;height:100%;
  background:var(--black);
  font-family:'Inter',sans-serif;font-weight:300;
  color:var(--white-90);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}

/* ═══════════════════════════
   FULLSCREEN STAGE
═══════════════════════════ */
#stage{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
}

/* BG image — fills perfectly on all devices */
.stage-bg{
  position:absolute;inset:0;
  background:url('hall-bg.png') center center / cover no-repeat;
  z-index:0;
}
/* Subtle vignette to deepen edges */
.stage-bg::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 85% 85% at 50% 50%,
    transparent 40%,
    rgba(0,0,0,0.55) 100%
  );
}

/* ═══════════════════════════
   TITLE
═══════════════════════════ */
.hall-title{
  position:absolute;
  top:clamp(12px,4vw,52px);
  left:50%;transform:translateX(-50%);
  z-index:20;
  text-align:center;
  pointer-events:none;
}
.hall-title h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(18px,3.2vw,52px);
  font-weight:300;letter-spacing:0.3em;
  text-transform:uppercase;
  color:var(--white);
  text-shadow:0 0 40px rgba(196,164,107,0.5), 0 2px 4px rgba(0,0,0,0.8);
}
.hall-title-line{
  width:clamp(80px,12vw,180px);height:1px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  margin:8px auto 0;
}
.hall-title-sub{
  font-size:clamp(7px,0.9vw,11px);letter-spacing:0.25em;
  text-transform:uppercase;color:rgba(196,164,107,0.6);
  margin-top:6px;
}

/* ═══════════════════════════
   PORTAL ROW — 7 portals
   Positioned to align with arches in background image
═══════════════════════════ */
.portal-row{
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  z-index:10;
  pointer-events:none;
}

.portal{
  position:absolute;
  display:flex;flex-direction:column;align-items:center;
  pointer-events:all;
  cursor:pointer;
  /* Each portal = clickable arch zone */
}

/* Portal label above arch icon */
.portal-label{
  font-size:clamp(7px,0.85vw,11px);
  letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(196,164,107,0.7);
  margin-bottom:clamp(4px,0.8vw,10px);
  text-align:center;
  transition:color 0.3s;
  text-shadow:0 1px 4px rgba(0,0,0,0.9);
  white-space:nowrap;
}
.portal:hover .portal-label{color:var(--gold-bright);}

/* Portal icon area — where the arch symbol sits in the image */
.portal-icon-wrap{
  width:clamp(32px,4vw,64px);
  height:clamp(32px,4vw,64px);
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.portal-icon{
  font-size:clamp(16px,2.2vw,32px);
  color:rgba(196,164,107,0.6);
  transition:all 0.35s;
  filter:drop-shadow(0 0 8px rgba(196,164,107,0.3));
  z-index:2;
  position:relative;
}
.portal:hover .portal-icon{
  color:var(--gold-bright);
  filter:drop-shadow(0 0 16px rgba(196,164,107,0.9)) drop-shadow(0 0 32px rgba(196,164,107,0.5));
  transform:scale(1.12);
}

/* ═══════════════════════════
   GLASS DOOR — slides in two halves
═══════════════════════════ */
.portal-door{
  position:fixed;
  inset:0;
  z-index:500;
  pointer-events:none;
  overflow:hidden;
  display:none;
}
.portal-door.opening{display:block;pointer-events:all;}

.door-left,.door-right{
  position:absolute;top:0;bottom:0;
  width:50%;
  background:linear-gradient(135deg,
    rgba(6,5,3,0.97) 0%,
    rgba(15,12,8,0.98) 40%,
    rgba(8,6,4,0.97) 100%
  );
  /* Dark glass texture */
  backdrop-filter:blur(2px);
  transition:transform 1.1s cubic-bezier(0.76,0,0.24,1);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.door-left{
  left:0;
  border-right:1px solid rgba(196,164,107,0.3);
  transform:translateX(0);
}
.door-right{
  right:0;
  border-left:1px solid rgba(196,164,107,0.3);
  transform:translateX(0);
}

/* Golden engravings on doors */
.door-left::before,.door-right::before{
  content:'';
  position:absolute;inset:0;
  background:
    linear-gradient(180deg, transparent 0%, rgba(196,164,107,0.04) 50%, transparent 100%),
    repeating-linear-gradient(90deg, transparent 0px, transparent 40px, rgba(196,164,107,0.03) 40px, rgba(196,164,107,0.03) 41px);
}
/* Vertical gold line near center edge */
.door-left::after{
  content:'';position:absolute;
  right:clamp(12px,3vw,40px);top:10%;bottom:10%;
  width:1px;
  background:linear-gradient(to bottom, transparent, rgba(196,164,107,0.5) 30%, rgba(196,164,107,0.6) 50%, rgba(196,164,107,0.5) 70%, transparent);
}
.door-right::after{
  content:'';position:absolute;
  left:clamp(12px,3vw,40px);top:10%;bottom:10%;
  width:1px;
  background:linear-gradient(to bottom, transparent, rgba(196,164,107,0.5) 30%, rgba(196,164,107,0.6) 50%, rgba(196,164,107,0.5) 70%, transparent);
}

/* Engraving SVG pattern on each door */
.door-engraving{
  position:absolute;
  opacity:0.25;
  pointer-events:none;
}
.door-left .door-engraving{right:clamp(20px,4vw,60px);}
.door-right .door-engraving{left:clamp(20px,4vw,60px);}

/* When doors open — slide apart */
.portal-door.open .door-left{transform:translateX(-100%);}
.portal-door.open .door-right{transform:translateX(100%);}

/* Glow line at center seam */
.door-seam{
  position:absolute;top:0;bottom:0;left:50%;
  width:2px;transform:translateX(-50%);
  background:linear-gradient(to bottom,
    transparent,
    rgba(196,164,107,0.6) 20%,
    rgba(196,164,107,0.8) 50%,
    rgba(196,164,107,0.6) 80%,
    transparent
  );
  box-shadow:0 0 12px rgba(196,164,107,0.4);
  z-index:2;
  transition:opacity 0.4s;
}
.portal-door.open .door-seam{opacity:0;}

/* Door handle ornament at center */
.door-handle-left,.door-handle-right{
  position:absolute;
  top:50%;
  width:clamp(16px,2vw,28px);height:clamp(40px,5vw,70px);
  border:1px solid rgba(196,164,107,0.5);
  background:rgba(196,164,107,0.08);
  transform:translateY(-50%);
  transition:opacity 0.3s;
}
.door-handle-left{right:clamp(6px,1.2vw,18px);}
.door-handle-right{left:clamp(6px,1.2vw,18px);}
.portal-door.open .door-handle-left,
.portal-door.open .door-handle-right{opacity:0;}

/* ═══════════════════════════
   PAGE FADE OVERLAY
═══════════════════════════ */
#page-fade{
  position:fixed;inset:0;z-index:400;
  background:var(--black);
  opacity:0;pointer-events:none;
  transition:opacity 0.5s ease;
}
#page-fade.fading{opacity:1;pointer-events:all;}

/* ═══════════════════════════
   BOTTOM PANEL — 7 buttons
═══════════════════════════ */
.bottom-panel{
  position:absolute;
  bottom:clamp(12px,3vh,40px);
  left:50%;transform:translateX(-50%);
  z-index:20;
  display:flex;align-items:center;gap:0;
  /* Glass panel matching image design */
  background:rgba(0,0,0,0.65);
  border:1px solid rgba(196,164,107,0.3);
  border-radius:4px;
  padding:clamp(8px,1.5vw,16px) clamp(12px,2.5vw,32px);
  backdrop-filter:blur(12px);
  /* Golden corner ornaments */
  box-shadow:0 0 0 1px rgba(196,164,107,0.08), 0 8px 40px rgba(0,0,0,0.6);
}
.bottom-panel::before,.bottom-panel::after{
  content:'◈';
  position:absolute;
  font-size:clamp(8px,1vw,12px);
  color:rgba(196,164,107,0.4);
}
.bottom-panel::before{top:-8px;left:clamp(12px,3vw,32px);}
.bottom-panel::after{top:-8px;right:clamp(12px,3vw,32px);}

.bottom-btn{
  display:flex;flex-direction:column;align-items:center;gap:clamp(3px,0.6vw,7px);
  cursor:pointer;
  padding:clamp(4px,1vw,10px) clamp(8px,1.8vw,22px);
  transition:all 0.25s;
  position:relative;
  text-decoration:none;color:inherit;
  border-radius:3px;
}
.bottom-btn:hover{background:rgba(196,164,107,0.06);}
.bottom-btn + .bottom-btn::before{
  content:'';
  position:absolute;left:0;top:20%;bottom:20%;
  width:1px;background:rgba(196,164,107,0.15);
}

.bottom-btn-icon{
  width:clamp(28px,4vw,48px);height:clamp(28px,4vw,48px);
  border:1px solid rgba(196,164,107,0.3);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(12px,1.6vw,20px);
  color:rgba(196,164,107,0.55);
  transition:all 0.25s;
  background:rgba(0,0,0,0.3);
}
.bottom-btn:hover .bottom-btn-icon{
  border-color:var(--gold);
  color:var(--gold);
  box-shadow:0 0 16px rgba(196,164,107,0.4);
  background:rgba(196,164,107,0.08);
}
.bottom-btn-label{
  font-size:clamp(6px,0.7vw,9px);
  letter-spacing:0.18em;text-transform:uppercase;
  color:rgba(196,164,107,0.45);
  transition:color 0.25s;
  white-space:nowrap;
}
.bottom-btn:hover .bottom-btn-label{color:var(--gold);}

/* ═══════════════════════════
   CORNER MARKERS
═══════════════════════════ */
.corner{
  position:absolute;z-index:15;
  font-size:clamp(7px,0.8vw,10px);
  letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(196,164,107,0.35);
  pointer-events:none;
}
.corner-tl{top:clamp(8px,2vh,24px);left:clamp(10px,2vw,28px);}
.corner-tr{top:clamp(8px,2vh,24px);right:clamp(10px,2vw,28px);text-align:right;}
.corner-bl{bottom:clamp(8px,2vh,24px);left:clamp(10px,2vw,28px);}
.corner-br{bottom:clamp(8px,2vh,24px);right:clamp(10px,2vw,28px);text-align:right;}

/* ═══════════════════════════
   RESPONSIVE PORTAL POSITIONS
   Mapped to image arch positions
   Image is 1280×853. Arches spread across width.
   Portal hotspots (approx % positions):
   1:Shield    ~10% x, ~42% y
   2:Registry  ~20% x, ~40% y
   3:Signal    ~30% x, ~38% y
   4:Gateway   ~40% x, ~36% y
   5:Institution ~60% x, ~36% y
   6:Network   ~70% x, ~38% y
   7:Protocol  ~80% x, ~40% y
   (center arch at 50% is the main entrance / hologram spot)
═══════════════════════════ */

/* Portal positions use vw/vh to scale with viewport */
</style>
</head>
<body>

<!-- Page fade overlay -->
<div id="page-fade"></div>

<!-- Glass door overlay (reused for all portals) -->
<div class="portal-door" id="portal-door">
  <div class="door-seam"></div>
  <div class="door-left">
    <svg class="door-engraving" width="80" height="300" viewBox="0 0 80 300">
      <rect x="10" y="10" width="60" height="280" fill="none" stroke="rgba(196,164,107,0.6)" stroke-width="0.5"/>
      <rect x="20" y="30" width="40" height="100" fill="none" stroke="rgba(196,164,107,0.4)" stroke-width="0.5"/>
      <line x1="40" y1="10" x2="40" y2="290" stroke="rgba(196,164,107,0.2)" stroke-width="0.5" stroke-dasharray="4,8"/>
      <circle cx="40" cy="150" r="12" fill="none" stroke="rgba(196,164,107,0.5)" stroke-width="0.5"/>
      <circle cx="40" cy="150" r="5" fill="none" stroke="rgba(196,164,107,0.4)" stroke-width="0.5"/>
      <line x1="28" y1="150" x2="52" y2="150" stroke="rgba(196,164,107,0.3)" stroke-width="0.5"/>
      <line x1="40" y1="138" x2="40" y2="162" stroke="rgba(196,164,107,0.3)" stroke-width="0.5"/>
      <rect x="20" y="180" width="40" height="80" fill="none" stroke="rgba(196,164,107,0.3)" stroke-width="0.5"/>
      <line x1="10" y1="260" x2="70" y2="260" stroke="rgba(196,164,107,0.3)" stroke-width="0.5"/>
    </svg>
    <div class="door-handle-left"></div>
  </div>
  <div class="door-right">
    <svg class="door-engraving" width="80" height="300" viewBox="0 0 80 300">
      <rect x="10" y="10" width="60" height="280" fill="none" stroke="rgba(196,164,107,0.6)" stroke-width="0.5"/>
      <rect x="20" y="30" width="40" height="100" fill="none" stroke="rgba(196,164,107,0.4)" stroke-width="0.5"/>
      <line x1="40" y1="10" x2="40" y2="290" stroke="rgba(196,164,107,0.2)" stroke-width="0.5" stroke-dasharray="4,8"/>
      <circle cx="40" cy="150" r="12" fill="none" stroke="rgba(196,164,107,0.5)" stroke-width="0.5"/>
      <circle cx="40" cy="150" r="5" fill="none" stroke="rgba(196,164,107,0.4)" stroke-width="0.5"/>
      <line x1="28" y1="150" x2="52" y2="150" stroke="rgba(196,164,107,0.3)" stroke-width="0.5"/>
      <line x1="40" y1="138" x2="40" y2="162" stroke="rgba(196,164,107,0.3)" stroke-width="0.5"/>
      <rect x="20" y="180" width="40" height="80" fill="none" stroke="rgba(196,164,107,0.3)" stroke-width="0.5"/>
      <line x1="10" y1="260" x2="70" y2="260" stroke="rgba(196,164,107,0.3)" stroke-width="0.5"/>
    </svg>
    <div class="door-handle-right"></div>
  </div>
</div>

<!-- STAGE -->
<div id="stage">
  <div class="stage-bg"></div>

  <!-- Corner markers -->
  <div class="corner corner-tl">MMXXVI</div>
  <div class="corner corner-tr">EST. 2026</div>
  <div class="corner corner-bl">Veritas · Ratio · Fide</div>
  <div class="corner corner-br">01</div>

  <!-- Title -->
  <div class="hall-title">
    <h1>Lunara Society</h1>
    <div class="hall-title-line"></div>
    <div class="hall-title-sub">Trust Coordination Institution</div>
  </div>

  <!-- Portal overlays — positioned over each arch -->
  <div class="portal-row" id="portal-row"></div>

  <!-- Bottom Panel -->
  <div class="bottom-panel">
    <a href="registry.html" class="bottom-btn" data-fade="true">
      <div class="bottom-btn-icon">◎</div>
      <span class="bottom-btn-label">Registry</span>
    </a>
    <a href="member.html" class="bottom-btn" data-fade="true">
      <div class="bottom-btn-icon">◉</div>
      <span class="bottom-btn-label">Member</span>
    </a>
    <div class="bottom-btn" onclick="navigate('shield.html')">
      <div class="bottom-btn-icon">⬡</div>
      <span class="bottom-btn-label">Shield</span>
    </div>
    <div class="bottom-btn" onclick="navigate('doctrine.html')">
      <div class="bottom-btn-icon">⊹</div>
      <span class="bottom-btn-label">Doctrine</span>
    </div>
    <div class="bottom-btn" onclick="navigate('architecture.html')">
      <div class="bottom-btn-icon">⊞</div>
      <span class="bottom-btn-label">Architecture</span>
    </div>
    <div class="bottom-btn" onclick="navigate('join.html')">
      <div class="bottom-btn-icon">⊕</div>
      <span class="bottom-btn-label">Join</span>
    </div>
    <div class="bottom-btn" onclick="navigate('contact.html')">
      <div class="bottom-btn-icon">◈</div>
      <span class="bottom-btn-label">Contact</span>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// PORTAL DEFINITIONS
// Each portal maps to an arch in the background image.
// Positions are % of viewport — tuned to the image.
// ═══════════════════════════════════════════
const portals = [
  {
    id:'shield',
    label:'Shield',
    icon:'◎',
    // leftmost arch
    xPct:10.5, yPct:30,
    page:'shield.html'
  },
  {
    id:'registry',
    label:'Registry',
    icon:'⬡',
    xPct:21, yPct:28,
    page:'registry.html'
  },
  {
    id:'signal',
    label:'Signal',
    icon:'⊞',
    xPct:31, yPct:26,
    page:'signal.html'
  },
  {
    id:'gateway',
    label:'Gateway',
    icon:'⊕',
    xPct:41, yPct:24,
    page:'gateway.html'
  },
  {
    id:'institution',
    label:'Institution',
    icon:'⊟',
    xPct:59, yPct:24,
    page:'institution.html'
  },
  {
    id:'network',
    label:'Network',
    icon:'◈',
    xPct:69, yPct:26,
    page:'network.html'
  },
  {
    id:'protocol',
    label:'Protocol',
    icon:'◎',
    xPct:79.5, yPct:28,
    page:'protocol.html'
  }
];

// Build portal elements
const row = document.getElementById('portal-row');
portals.forEach(p => {
  const div = document.createElement('div');
  div.className = 'portal';
  div.style.cssText = `
    left:${p.xPct}%;
    top:${p.yPct}%;
    transform:translate(-50%,0);
  `;
  div.innerHTML = `
    <span class="portal-label">${p.label}</span>
    <div class="portal-icon-wrap">
      <span class="portal-icon">${p.icon}</span>
    </div>
  `;
  div.addEventListener('click', () => openPortal(p.page, div));
  row.appendChild(div);
});

// ═══════════════════════════════════════════
// DOOR + FADE NAVIGATION
// ═══════════════════════════════════════════
const door = document.getElementById('portal-door');
const fade = document.getElementById('page-fade');

function openPortal(page, portalEl) {
  // Show doors closed
  door.classList.add('opening');
  door.classList.remove('open');

  // Brief pause — doors visible closed — then open
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      setTimeout(() => {
        door.classList.add('open');
        // After doors fully open, fade to black, navigate
        setTimeout(() => {
          fade.classList.add('fading');
          setTimeout(() => {
            window.location.href = page;
          }, 520);
        }, 900);
      }, 80);
    });
  });
}

function navigate(page) {
  fade.classList.add('fading');
  setTimeout(() => { window.location.href = page; }, 520);
}

// Bottom panel links with fade
document.querySelectorAll('.bottom-btn[data-fade]').forEach(btn => {
  btn.addEventListener('click', e => {
    e.preventDefault();
    const href = btn.getAttribute('href');
    fade.classList.add('fading');
    setTimeout(() => { window.location.href = href; }, 520);
  });
});

// ═══════════════════════════════════════════
// FADE IN on page load
// ═══════════════════════════════════════════
window.addEventListener('load', () => {
  fade.style.opacity = '1';
  fade.style.transition = 'none';
  fade.style.pointerEvents = 'all';
  requestAnimationFrame(() => {
    setTimeout(() => {
      fade.style.transition = 'opacity 0.8s ease';
      fade.style.opacity = '0';
      setTimeout(() => {
        fade.style.pointerEvents = 'none';
      }, 820);
    }, 100);
  });
});
</script>
</body>
</html>
