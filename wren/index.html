<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wren">
<title>Wren — Command Center</title>
<link rel="manifest" href="/wren/manifest.json">
<link rel="icon" href="/wren/wren-icon.png">
<link rel="apple-touch-icon" href="/wren/wren-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#C4A46B;
  --black:#000;
  --glass:rgba(10,8,5,0.94);
  --border:rgba(196,164,107,0.35);
}
html,body{width:100%;height:100%;background:#000;color:#eee;font-family:'Inter',sans-serif;overflow:hidden;}
#shell{position:fixed;inset:0;display:flex;flex-direction:column;background:radial-gradient(circle at 50% 0%, #14110c 0%, #000 65%);}

#topbar{flex-shrink:0;padding:22px 20px 14px;text-align:center;border-bottom:1px solid var(--border);}
#topbar .eyebrow{font-size:10px;letter-spacing:0.35em;text-transform:uppercase;color:var(--gold);opacity:.8;}
#topbar .title{font-family:'Cormorant Garamond',serif;font-size:26px;letter-spacing:0.08em;color:#f2e6c9;margin-top:4px;}

#avatar-wrap{flex-shrink:0;display:flex;justify-content:center;padding:18px 0 6px;}
#avatar-wrap img{height:150px;object-fit:contain;filter:drop-shadow(0 0 24px rgba(196,164,107,0.35));}

#messages{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.msg{max-width:80%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.4;}
.msg.bot{align-self:flex-start;background:rgba(196,164,107,0.12);border:1px solid var(--border);color:#f2e6c9;}
.msg.user{align-self:flex-end;background:#C4A46B;color:#0a0806;font-weight:500;}
.msg.typing{align-self:flex-start;color:rgba(255,255,255,0.4);font-style:italic;font-size:13px;}

#inputbar{flex-shrink:0;display:flex;gap:8px;padding:12px 14px 20px;border-top:1px solid var(--border);background:var(--glass);}
#input{flex:1;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:#fff;font-size:14px;outline:none;}
#input::placeholder{color:rgba(255,255,255,0.35);}
#send{background:var(--gold);border:none;border-radius:10px;padding:0 18px;color:#0a0806;font-weight:600;font-size:13px;letter-spacing:0.05em;cursor:pointer;}
#send:disabled{opacity:.5;}
</style>
</head>
<body>
<div id="shell">
  <div id="topbar">
    <div class="eyebrow">Lunara Society</div>
    <div class="title">Wren — Command Center</div>
  </div>
  <div id="avatar-wrap"><img src="/wren/wren-fullbody.png" alt="Wren"></div>
  <div id="messages"></div>
  <div id="inputbar">
    <input id="input" type="text" placeholder="Tell Wren what you need…" autocomplete="off">
    <button id="send">Send</button>
  </div>
</div>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('/wren/sw.js').catch(function(){});
  });
}

(function(){
  var ENDPOINT = "https://superagent-d6d4ecd1.base44.app/functions/wrenPublicChat";
  var messages = document.getElementById('messages');
  var input = document.getElementById('input');
  var sendBtn = document.getElementById('send');
  var conversationId = null;
  try { conversationId = sessionStorage.getItem('wren_conv_id'); } catch(e){}

  function addMessage(text, who){
    var el = document.createElement('div');
    el.className = 'msg ' + who;
    el.textContent = text;
    messages.appendChild(el);
    messages.scrollTop = messages.scrollHeight;
    return el;
  }

  addMessage("I'm Wren — your live command center for Lunara Society. What do you need?", 'bot');

  function sendMessage(){
    var text = input.value.trim();
    if(!text) return;
    addMessage(text, 'user');
    input.value = '';
    sendBtn.disabled = true;
    var typingEl = addMessage('Wren is thinking…', 'typing');

    fetch(ENDPOINT, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ message: text, conversation_id: conversationId || undefined })
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      typingEl.remove();
      if(data.conversation_id){
        conversationId = data.conversation_id;
        try { sessionStorage.setItem('wren_conv_id', conversationId); } catch(e){}
      }
      addMessage(data.reply || "I'm having trouble connecting right now — try again shortly.", 'bot');
    })
    .catch(function(){
      typingEl.remove();
      addMessage("I'm having trouble connecting right now — try again shortly.", 'bot');
    })
    .finally(function(){ sendBtn.disabled = false; });
  }

  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', function(e){ if(e.key === 'Enter') sendMessage(); });
})();
</script>
</body>
</html>
