<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lunara Society — Trust Coordination Institution</title>
<meta name="description" content="Lunara Society is the trust coordination layer between businesses and autonomous AI systems.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" href="shield-logo.jpg">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#C4A46B;--gold-bright:#E0C080;
  --black:#000;
  --border:rgba(196,164,107,0.25);
}

html,body{
  width:100%;height:100%;
  background:#000;
  font-family:'Inter',sans-serif;font-weight:300;
  color:#fff;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  touch-action:none;
}

/* ── STAGE ───────────────────────────── */
#stage{
  position:fixed;inset:0;
  display:flex;align-items:stretch;
}

/* The background image is the entire site */
.stage-bg{
  position:absolute;inset:0;
  background:url('hall-bg.png') center center / cover no-repeat;
  z-index:0;
}

/* ── PORTAL OVERLAY LAYER ────────────── */
/* 
  Image analysis (1280×853):
  7 arch icons spread across the middle band of the image (~35-45% from top)
  Approximate X positions (% of width):
    Shield:    ~10%
    Registry:  ~21%
    Signal:    ~31%
    Gateway:   ~40%
    [Center arch — main, no portal, that's where Maya goes]
    Institution: ~60%
    Network:   ~69%
    Protocol:  ~79%
    Doctrine:  ~89%
  Y center of icons: ~40% from top
  
  Bottom panel icons (already drawn in image):
  Panel sits ~82% from top
  7 circles at: ~25%, ~33%, ~41%, ~50%, ~59%, ~67%, ~75% x
*/

.portal-layer{
  position:absolute;inset:0;z-index:10;
  pointer-events:none;
}

/* Each portal is a transparent clickable hit zone over the arch icon */
.portal{
  position:absolute;
  pointer-events:all;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;
  transform:translate(-50%,-50%);
}

/* Invisible hit area — large enough to be tappable on mobile */
.portal-hit{
  width:clamp(44px,7vw,90px);
  height:clamp(60px,9vw,110px);
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  gap:clamp(4px,0.6vw,8px);
  position:relative;
}

/* Portal label — appears on hover */
.portal-label{
  font-size:clamp(7px,0.75vw,10px);
  letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(196,164,107,0);
  transition:color 0.35s, text-shadow 0.35s;
  text-align:center;
  white-space:nowrap;
  text-shadow:none;
  font-weight:400;
}

/* Hover glow ring over the arch icon */
.portal-ring{
  width:clamp(36px,5.5vw,72px);
  height:clamp(36px,5.5vw,72px);
  border-radius:50%;
  border:1px solid rgba(196,164,107,0);
  transition:all 0.35s;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.portal-ring::before{
  content:'';position:absolute;inset:-4px;
  border-radius:50%;
  border:1px solid rgba(196,164,107,0);
  transition:all 0.35s;
}

/* HOVER STATES */
.portal:hover .portal-label{
  color:rgba(196,164,107,0.9);
  text-shadow:0 0 12px rgba(196,164,107,0.5);
}
.portal:hover .portal-ring{
  border-color:rgba(196,164,107,0.6);
  box-shadow:0 0 20px rgba(196,164,107,0.35), inset 0 0 12px rgba(196,164,107,0.08);
  background:rgba(196,164,107,0.05);
}
.portal:hover .portal-ring::before{
  border-color:rgba(196,164,107,0.2);
}

/* ── BOTTOM PANEL BUTTONS ─────────────── */
/* Transparent click zones over the 7 circles already in the image */
.bottom-layer{
  position:absolute;
  /* Panel is at ~80% down, centered horizontally */
  bottom:clamp(8px,7.5vh,64px);
  left:50%;transform:translateX(-50%);
  z-index:10;
  display:flex;
  align-items:center;
  gap:clamp(2px,1.8vw,22px);
  pointer-events:none;
}

.bottom-btn{
  pointer-events:all;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;
  gap:clamp(3px,0.5vw,6px);
  padding:clamp(6px,1.2vw,14px) clamp(6px,1.2vw,14px);
  border-radius:50%;
  transition:all 0.25s;
  text-decoration:none;color:inherit;
  /* Sits over the circle icons in the image */
  width:clamp(44px,6.5vw,80px);
  height:clamp(44px,6.5vw,80px);
  justify-content:center;
}
.bottom-btn:hover{
  background:rgba(196,164,107,0.1);
  box-shadow:0 0 24px rgba(196,164,107,0.3);
}
.bottom-btn-label{
  font-size:clamp(5px,0.6vw,8px);
  letter-spacing:0.15em;text-transform:uppercase;
  color:rgba(196,164,107,0);
  transition:color 0.25s;
  white-space:nowrap;
  position:absolute;
  bottom:-clamp(14px,2vw,22px);
}
.bottom-btn:hover .bottom-btn-label{
  color:rgba(196,164,107,0.8);
}

/* ── GLASS DOOR ───────────────────────── */
.portal-door{
  position:fixed;inset:0;z-index:500;
  pointer-events:none;display:none;
  overflow:hidden;
}
.portal-door.opening{display:block;pointer-events:all;}

.door-left,.door-right{
  position:absolute;top:0;bottom:0;width:50%;
  background:linear-gradient(160deg,
    rgba(4,3,2,0.97) 0%,
    rgba(12,9,5,0.98) 50%,
    rgba(6,4,2,0.97) 100%
  );
  transition:transform 1.15s cubic-bezier(0.77,0,0.18,1);
}
.door-left{
  left:0;
  border-right:1px solid rgba(196,164,107,0.4);
  transform:translateX(0);
}
.door-right{
  right:0;
  border-left:1px solid rgba(196,164,107,0.4);
  transform:translateX(0);
}

/* Golden geometric engravings */
.door-left::before{
  content:'';position:absolute;inset:0;
  background:
    repeating-linear-gradient(0deg, transparent 0, transparent 60px, rgba(196,164,107,0.025) 60px, rgba(196,164,107,0.025) 61px),
    repeating-linear-gradient(90deg, transparent 0, transparent 80px, rgba(196,164,107,0.015) 80px, rgba(196,164,107,0.015) 81px);
}
.door-right::before{
  content:'';position:absolute;inset:0;
  background:
    repeating-linear-gradient(0deg, transparent 0, transparent 60px, rgba(196,164,107,0.025) 60px, rgba(196,164,107,0.025) 61px),
    repeating-linear-gradient(90deg, transparent 0, transparent 80px, rgba(196,164,107,0.015) 80px, rgba(196,164,107,0.015) 81px);
}

/* Vertical gold accent line near center seam */
.door-left::after{
  content:'';position:absolute;
  right:clamp(16px,3.5vw,52px);top:8%;bottom:8%;
  width:1px;
  background:linear-gradient(to bottom,
    transparent,rgba(196,164,107,0.55) 25%,
    rgba(196,164,107,0.7) 50%,
    rgba(196,164,107,0.55) 75%,transparent
  );
  box-shadow:0 0 8px rgba(196,164,107,0.3);
}
.door-right::after{
  content:'';position:absolute;
  left:clamp(16px,3.5vw,52px);top:8%;bottom:8%;
  width:1px;
  background:linear-gradient(to bottom,
    transparent,rgba(196,164,107,0.55) 25%,
    rgba(196,164,107,0.7) 50%,
    rgba(196,164,107,0.55) 75%,transparent
  );
  box-shadow:0 0 8px rgba(196,164,107,0.3);
}

/* Gold engraving SVGs on doors */
.door-engraving{
  position:absolute;top:50%;
  transform:translateY(-50%);
  opacity:0.2;
  width:clamp(60px,8vw,140px);
}
.door-left .door-engraving{right:clamp(30px,5vw,80px);}
.door-right .door-engraving{left:clamp(30px,5vw,80px);}

/* Door handle */
.door-handle{
  position:absolute;top:50%;transform:translateY(-50%);
  width:clamp(10px,1.5vw,20px);height:clamp(32px,5vw,64px);
  border:1px solid rgba(196,164,107,0.6);
  background:rgba(196,164,107,0.12);
  box-shadow:0 0 8px rgba(196,164,107,0.2);
  transition:opacity 0.4s;
}
.door-left .door-handle{right:clamp(4px,0.8vw,12px);}
.door-right .door-handle{left:clamp(4px,0.8vw,12px);}

/* Center seam glow */
.door-seam{
  position:absolute;top:0;bottom:0;left:50%;
  width:2px;transform:translateX(-50%);
  background:linear-gradient(to bottom,
    transparent,rgba(196,164,107,0.7) 20%,
    rgba(196,164,107,0.9) 50%,
    rgba(196,164,107,0.7) 80%,transparent
  );
  box-shadow:0 0 16px rgba(196,164,107,0.5);
  z-index:2;transition:opacity 0.5s;
}

/* OPEN STATE */
.portal-door.open .door-left{transform:translateX(-100%);}
.portal-door.open .door-right{transform:translateX(100%);}
.portal-door.open .door-seam{opacity:0;}
.portal-door.open .door-handle{opacity:0;}

/* ── PAGE FADE ────────────────────────── */
#page-fade{
  position:fixed;inset:0;z-index:400;
  background:#000;opacity:0;pointer-events:none;
  transition:opacity 0.55s ease;
}
#page-fade.fading{opacity:1;pointer-events:all;}

/* ── CORNER TEXT ─────────────────────── */
.corner{
  position:absolute;z-index:15;
  font-size:clamp(6px,0.7vw,9px);
  letter-spacing:0.25em;text-transform:uppercase;
  color:rgba(196,164,107,0.3);
  pointer-events:none;
  font-weight:300;
}
.corner-bl{bottom:clamp(6px,1.5vh,18px);left:clamp(10px,1.5vw,20px);}
.corner-br{bottom:clamp(6px,1.5vh,18px);right:clamp(10px,1.5vw,20px);}
</style>
</head>
<body>

<!-- Page fade -->
<div id="page-fade"></div>

<!-- Glass doors -->
<div class="portal-door" id="portal-door">
  <div class="door-seam"></div>
  <div class="door-left">
    <svg class="door-engraving" viewBox="0 0 100 360">
      <rect x="8" y="8" width="84" height="344" fill="none" stroke="rgba(196,164,107,0.8)" stroke-width="0.6"/>
      <rect x="18" y="24" width="64" height="96" fill="none" stroke="rgba(196,164,107,0.6)" stroke-width="0.5"/>
      <line x1="50" y1="8" x2="50" y2="352" stroke="rgba(196,164,107,0.3)" stroke-width="0.4" stroke-dasharray="5,10"/>
      <circle cx="50" cy="180" r="18" fill="none" stroke="rgba(196,164,107,0.7)" stroke-width="0.5"/>
      <circle cx="50" cy="180" r="8" fill="none" stroke="rgba(196,164,107,0.5)" stroke-width="0.5"/>
      <line x1="32" y1="180" x2="68" y2="180" stroke="rgba(196,164,107,0.4)" stroke-width="0.4"/>
      <line x1="50" y1="162" x2="50" y2="198" stroke="rgba(196,164,107,0.4)" stroke-width="0.4"/>
      <rect x="18" y="228" width="64" height="96" fill="none" stroke="rgba(196,164,107,0.5)" stroke-width="0.5"/>
      <line x1="8" y1="320" x2="92" y2="320" stroke="rgba(196,164,107,0.4)" stroke-width="0.4"/>
      <polygon points="50,12 58,24 42,24" fill="none" stroke="rgba(196,164,107,0.5)" stroke-width="0.5"/>
    </svg>
    <div class="door-handle"></div>
  </div>
  <div class="door-right">
    <svg class="door-engraving" viewBox="0 0 100 360">
      <rect x="8" y="8" width="84" height="344" fill="none" stroke="rgba(196,164,107,0.8)" stroke-width="0.6"/>
      <rect x="18" y="24" width="64" height="96" fill="none" stroke="rgba(196,164,107,0.6)" stroke-width="0.5"/>
      <line x1="50" y1="8" x2="50" y2="352" stroke="rgba(196,164,107,0.3)" stroke-width="0.4" stroke-dasharray="5,10"/>
      <circle cx="50" cy="180" r="18" fill="none" stroke="rgba(196,164,107,0.7)" stroke-width="0.5"/>
      <circle cx="50" cy="180" r="8" fill="none" stroke="rgba(196,164,107,0.5)" stroke-width="0.5"/>
      <line x1="32" y1="180" x2="68" y2="180" stroke="rgba(196,164,107,0.4)" stroke-width="0.4"/>
      <line x1="50" y1="162" x2="50" y2="198" stroke="rgba(196,164,107,0.4)" stroke-width="0.4"/>
      <rect x="18" y="228" width="64" height="96" fill="none" stroke="rgba(196,164,107,0.5)" stroke-width="0.5"/>
      <line x1="8" y1="320" x2="92" y2="320" stroke="rgba(196,164,107,0.4)" stroke-width="0.4"/>
      <polygon points="50,12 58,24 42,24" fill="none" stroke="rgba(196,164,107,0.5)" stroke-width="0.5"/>
    </svg>
    <div class="door-handle"></div>
  </div>
</div>

<!-- STAGE -->
<div id="stage">
  <div class="stage-bg"></div>

  <!-- Corner text -->
  <div class="corner corner-bl">Est. 2026 · Veritas · Ratio · Fide</div>
  <div class="corner corner-br">MMXXVI</div>

  <!-- Portal interactive layer -->
  <div class="portal-layer" id="portal-layer"></div>

  <!-- Bottom buttons — transparent overlays on the 7 circles in image -->
  <div class="bottom-layer">
    <div class="bottom-btn" onclick="navigate('shield.html')" title="Shield" style="position:relative;">
      <span class="bottom-btn-label">Shield</span>
    </div>
    <div class="bottom-btn" onclick="navigate('architecture.html')" title="Architecture" style="position:relative;">
      <span class="bottom-btn-label">Architecture</span>
    </div>
    <div class="bottom-btn" onclick="navigate('signal.html')" title="Signal" style="position:relative;">
      <span class="bottom-btn-label">Signal</span>
    </div>
    <div class="bottom-btn" onclick="navigate('doctrine.html')" title="Doctrine" style="position:relative;">
      <span class="bottom-btn-label">Doctrine</span>
    </div>
    <div class="bottom-btn" onclick="navigate('institution.html')" title="Institution" style="position:relative;">
      <span class="bottom-btn-label">Institution</span>
    </div>
    <div class="bottom-btn" onclick="navigate('network.html')" title="Network" style="position:relative;">
      <span class="bottom-btn-label">Network</span>
    </div>
    <div class="bottom-btn" onclick="navigate('join.html')" title="Join" style="position:relative;">
      <span class="bottom-btn-label">Join</span>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
// PORTAL DEFINITIONS
// Positions calibrated to arch icon locations
// in the 1280×853 background image.
// X,Y as percentage of viewport.
// ─────────────────────────────────────────
const portals = [
  { label:'Shield',      page:'shield.html',       x:10.2, y:41 },
  { label:'Registry',    page:'registry.html',      x:20.8, y:38.5 },
  { label:'Signal',      page:'signal.html',        x:31.2, y:36.5 },
  { label:'Gateway',     page:'gateway.html',       x:41.0, y:35 },
  // center arch (50%) is the main arch — no portal, that's Maya's platform
  { label:'Institution', page:'institution.html',   x:59.0, y:35 },
  { label:'Network',     page:'network.html',       x:68.8, y:36.5 },
  { label:'Protocol',    page:'protocol.html',      x:79.2, y:38.5 },
  // Far right arch
  { label:'Doctrine',    page:'doctrine.html',      x:89.5, y:41 },
];

const layer = document.getElementById('portal-layer');
portals.forEach(p => {
  const el = document.createElement('div');
  el.className = 'portal';
  el.style.cssText = `left:${p.x}%;top:${p.y}%;`;
  el.innerHTML = `
    <div class="portal-hit">
      <span class="portal-label">${p.label}</span>
      <div class="portal-ring"></div>
    </div>`;
  el.addEventListener('click', () => openPortal(p.page));
  layer.appendChild(el);
});

// ─────────────────────────────────────────
// DOOR + FADE NAVIGATION
// ─────────────────────────────────────────
const door  = document.getElementById('portal-door');
const fade  = document.getElementById('page-fade');
let   busy  = false;

function openPortal(page) {
  if (busy) return;
  busy = true;
  // Show doors closed
  door.style.display = 'block';
  door.classList.remove('open');
  void door.offsetWidth; // force reflow

  // Tiny delay then open
  setTimeout(() => {
    door.classList.add('open');
    // After doors fully open → fade black → navigate
    setTimeout(() => {
      fade.classList.add('fading');
      setTimeout(() => { window.location.href = page; }, 540);
    }, 1050);
  }, 60);
}

function navigate(page) {
  if (busy) return;
  busy = true;
  fade.classList.add('fading');
  setTimeout(() => { window.location.href = page; }, 540);
}

// ─────────────────────────────────────────
// FADE IN ON LOAD
// ─────────────────────────────────────────
window.addEventListener('load', () => {
  fade.style.opacity = '1';
  fade.style.transition = 'none';
  fade.style.pointerEvents = 'all';
  requestAnimationFrame(() => {
    setTimeout(() => {
      fade.style.transition = 'opacity 0.9s ease';
      fade.style.opacity = '0';
      setTimeout(() => { fade.style.pointerEvents = 'none'; }, 920);
    }, 80);
  });
});
</script>
</body>
</html>
