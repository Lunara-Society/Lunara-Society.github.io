<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lunara Society — Trust Coordination Institution</title>
<meta name="description" content="Lunara Society. Trust Coordination Institution. Est. 2026.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#C4A46B;
  --gold-bright:#E2C47A;
  --gold-warm:#D4A853;
  --gold-dim:rgba(196,164,107,0.15);
  --black:#000;
  --deep:#020100;
}
html,body{
  width:100%;height:100%;
  background:#000;
  font-family:'Inter',sans-serif;font-weight:300;
  color:#fff;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  touch-action:auto;
}

/* ════════════════════════════════════════
   CINEMATIC ARRIVAL OVERLAY
   Covers everything. Lifts on arrival sequence.
════════════════════════════════════════ */
#arrival{
  position:fixed;inset:0;z-index:900;
  background:#000;
  opacity:1;
  pointer-events:all;
  transition:opacity 1.8s ease;
}

/* The faint golden seam that appears at 0.5s */
#arrival-seam{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scaleX(0);
  width:clamp(120px,20vw,260px);height:1px;
  background:linear-gradient(to right,transparent,rgba(196,164,107,0.55),transparent);
  opacity:0;
  transition:none;
}

/* ════════════════════════════════════════
   MAIN STAGE
════════════════════════════════════════ */
#hall{
  position:fixed;inset:0;
  opacity:0;
  will-change:transform;
}

/* Background image — the hall */
#hall-bg{
  position:absolute;
  /* Slightly oversized so camera can breathe */
  inset:-3%;width:106%;height:106%;
  background:url('hall-bg.png') center center / cover no-repeat;
  transform-origin:50% 50%;
  will-change:transform;
}

/* ════════════════════════════════════════
   LIVING ATMOSPHERE LAYERS
════════════════════════════════════════ */
/* Ceiling orrery glow — begins at 3.5s */
#ceiling-life{
  position:absolute;
  top:0;left:50%;transform:translateX(-50%);
  width:52%;height:30%;
  background:radial-gradient(ellipse 70% 80% at 50% 5%,
    rgba(196,164,107,0.065) 0%,
    rgba(196,164,107,0.02) 60%,
    transparent 100%
  );
  opacity:0;
  will-change:opacity;
  pointer-events:none;
  z-index:2;
}

/* Floor reflections */
#floor-life{
  position:absolute;
  bottom:0;left:50%;transform:translateX(-50%);
  width:72%;height:42%;
  background:radial-gradient(ellipse 80% 70% at 50% 100%,
    rgba(196,164,107,0.055) 0%,
    rgba(196,164,107,0.015) 55%,
    transparent 100%
  );
  opacity:0;
  will-change:opacity;
  pointer-events:none;
  z-index:2;
}

/* Central portal pulse */
#portal-pulse{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-60%);
  width:clamp(40px,5vw,80px);height:clamp(40px,5vw,80px);
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,240,200,0.12) 0%,transparent 70%);
  opacity:0;
  pointer-events:none;
  z-index:3;
  will-change:opacity,transform;
}

/* Dust motes — rare, in light shafts */
#dust{
  position:absolute;inset:0;z-index:2;
  pointer-events:none;
  overflow:hidden;
}
.mote{
  position:absolute;
  width:1px;height:1px;
  background:rgba(255,245,220,0.7);
  border-radius:50%;
  opacity:0;
  will-change:transform,opacity;
}

/* Hidden event layers */
#hidden-observatory{
  position:absolute;
  top:8%;right:5%;
  width:clamp(30px,4vw,60px);height:clamp(30px,4vw,60px);
  background:radial-gradient(circle,rgba(196,164,107,0.18) 0%,transparent 70%);
  opacity:0;pointer-events:none;z-index:3;
}
#hidden-symbol{
  position:absolute;
  top:38%;left:50%;transform:translate(-50%,-50%);
  opacity:0;pointer-events:none;z-index:3;
}
#hidden-doorway{
  position:absolute;
  bottom:20%;right:2%;
  width:clamp(8px,1.2vw,18px);height:clamp(20px,3vw,40px);
  background:linear-gradient(to bottom,transparent,rgba(196,164,107,0.12),transparent);
  opacity:0;pointer-events:none;z-index:3;
}

/* Floor energy lines — travel from console to portal */
#floor-energy{
  position:absolute;inset:0;z-index:3;
  pointer-events:none;
  overflow:hidden;
}

/* ════════════════════════════════════════
   INSCRIPTION
════════════════════════════════════════ */
#inscription{
  position:absolute;
  top:clamp(8px,3.2vh,32px);
  left:50%;transform:translateX(-50%);
  z-index:10;pointer-events:none;
  white-space:nowrap;
  opacity:0;
}
#inscription span{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(7px,0.85vw,11px);
  letter-spacing:0.38em;text-transform:uppercase;
  color:rgba(196,164,107,0.22);
  font-style:italic;font-weight:300;
}

/* ════════════════════════════════════════
   PORTAL INTERACTIVE LAYER
════════════════════════════════════════ */
#portal-layer{
  position:absolute;inset:0;z-index:10;
  pointer-events:none;
}
.portal{
  position:absolute;
  pointer-events:all;
  cursor:pointer;
  transform:translate(-50%,-50%);
  padding:10px;
  transition:all 0.2s;
}
.portal-hit{
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-end;
  gap:clamp(4px,0.7vw,9px);
  width:clamp(48px,7.5vw,96px);
  height:clamp(64px,10vw,120px);
}
.portal-label{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(7px,0.8vw,11px);
  letter-spacing:0.28em;text-transform:uppercase;
  color:rgba(196,164,107,0);
  transition:color 0.5s, text-shadow 0.5s;
  text-align:center;white-space:nowrap;
  font-style:italic;font-weight:300;
}
.portal-ring{
  width:clamp(36px,5.2vw,68px);height:clamp(36px,5.2vw,68px);
  border-radius:50%;
  border:1px solid rgba(196,164,107,0);
  transition:all 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
  position:relative;background:transparent;
}
.portal-ring::before{
  content:'';position:absolute;inset:-5px;border-radius:50%;
  border:1px solid rgba(196,164,107,0);
  transition:all 0.5s;
}
/* Dormant — very faint inner glow, barely visible */
.portal-ring::after{
  content:'';position:absolute;inset:8px;border-radius:50%;
  background:radial-gradient(circle,rgba(196,164,107,0.03) 0%,transparent 70%);
  transition:all 0.5s;
}

/* AWAKE */
.portal:hover .portal-label,
.portal.awakened .portal-label{
  color:rgba(196,164,107,0.88);
  text-shadow:0 0 14px rgba(196,164,107,0.4);
}
.portal:hover .portal-ring,
.portal.awakened .portal-ring{
  border-color:rgba(196,164,107,0.5);
  box-shadow:0 0 20px rgba(196,164,107,0.22),0 0 40px rgba(196,164,107,0.08);
  background:rgba(196,164,107,0.03);
}
.portal:hover .portal-ring::before,
.portal.awakened .portal-ring::before{
  border-color:rgba(196,164,107,0.15);
}
.portal:hover .portal-ring::after{
  background:radial-gradient(circle,rgba(196,164,107,0.08) 0%,transparent 70%);
}

/* ════════════════════════════════════════
   FLOOR CONSOLE
════════════════════════════════════════ */
#console-wrap{
  position:absolute;
  bottom:0;left:0;right:0;
  z-index:10;
  display:flex;align-items:flex-end;justify-content:center;
  /* console rises from marble — starts below viewport */
  transform:translateY(120%);
  padding-bottom:clamp(4px,2vh,22px);
}
#console-inner{
  display:flex;align-items:center;justify-content:space-between;
  width:clamp(280px,86vw,1020px);
  padding:0 clamp(3px,1.2vw,16px);
  position:relative;
}
/* Hairline seam above console */
#console-inner::before{
  content:'';position:absolute;
  top:-clamp(6px,1.2vh,14px);left:0;right:0;height:1px;
  background:linear-gradient(to right,transparent,rgba(196,164,107,0.18) 20%,rgba(196,164,107,0.28) 50%,rgba(196,164,107,0.18) 80%,transparent);
}

.cbtn{
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;
  gap:clamp(2px,0.4vh,5px);
  flex:1;min-width:0;
  padding:clamp(3px,0.7vh,8px) 0;
  position:relative;
  transition:background 0.4s;
  border-radius:2px;
}
.cbtn:hover,.cbtn:active{
  background:rgba(196,164,107,0.04);
}
/* Carved divider */
.cbtn+.cbtn::before{
  content:'';position:absolute;left:0;top:18%;bottom:18%;
  width:1px;background:rgba(196,164,107,0.07);
}
.cicon{
  width:clamp(26px,3.8vw,48px);height:clamp(26px,3.8vw,48px);
  border-radius:50%;
  border:1px solid rgba(196,164,107,0.2);
  background:rgba(0,0,0,0.4);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;overflow:hidden;
  transition:border-color 0.4s,box-shadow 0.4s,background 0.4s;
  /* Subtle engraving depression on click */
}
.cicon svg{
  width:52%;height:52%;
  opacity:0.45;
  transition:opacity 0.4s;
}
.cbtn:hover .cicon,.cbtn:active .cicon{
  border-color:rgba(196,164,107,0.5);
  background:rgba(196,164,107,0.06);
  box-shadow:0 0 14px rgba(196,164,107,0.18);
}
.cbtn:hover .cicon svg,.cbtn:active .cicon svg{opacity:0.88;}
/* Click depression */
.cbtn:active .cicon{
  box-shadow:inset 0 1px 4px rgba(0,0,0,0.6);
  transform:translateY(1px);
}
.clabel{
  font-size:clamp(5px,0.6vw,7.5px);
  letter-spacing:0.22em;text-transform:uppercase;
  color:rgba(196,164,107,0.28);
  transition:color 0.4s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:100%;
}
.cbtn:hover .clabel,.cbtn:active .clabel{color:rgba(196,164,107,0.75);}

/* Architectural footer strip */
#footer-strip{
  position:absolute;bottom:0;left:0;right:0;
  z-index:9;
  padding:clamp(3px,0.6vh,8px) clamp(12px,2vw,28px);
  display:flex;justify-content:space-between;align-items:center;
  pointer-events:none;
  opacity:0;
  background:rgba(0,0,0,0.35);
  border-top:1px solid rgba(196,164,107,0.06);
}
#footer-strip span,#footer-strip a{
  font-size:clamp(5px,0.55vw,7px);
  letter-spacing:0.22em;text-transform:uppercase;
  color:rgba(196,164,107,0.18);
  text-decoration:none;
  font-family:'Inter',sans-serif;
  pointer-events:all;
  transition:color 0.3s;
}
#footer-strip a:hover{color:rgba(196,164,107,0.55);}

/* ════════════════════════════════════════
   CORNER MARKS
════════════════════════════════════════ */
.mark{
  position:absolute;z-index:10;
  font-size:clamp(5.5px,0.6vw,8px);
  letter-spacing:0.28em;text-transform:uppercase;
  color:rgba(196,164,107,0.18);pointer-events:none;
  font-weight:300;opacity:0;
}
.mark-bl{bottom:clamp(14px,3.5vh,36px);left:clamp(8px,1.2vw,16px);}
.mark-br{bottom:clamp(14px,3.5vh,36px);right:clamp(8px,1.2vw,16px);text-align:right;}

/* ════════════════════════════════════════
   GLASS DOOR — ELEVATOR
════════════════════════════════════════ */
#door{
  position:fixed;inset:0;z-index:800;
  visibility:hidden;overflow:hidden;
}
#door.armed{visibility:visible;pointer-events:all;}
.dleft,.dright{
  position:absolute;top:0;bottom:0;width:50%;
  background:linear-gradient(168deg,rgba(3,2,1,0.99) 0%,rgba(9,6,3,0.99) 50%,rgba(3,2,1,0.99) 100%);
  will-change:transform;
  transition:transform 1.05s cubic-bezier(0.76,0,0.24,1);
}
.dleft{
  left:0;border-right:1px solid rgba(196,164,107,0.5);transform:translateX(0);
}
.dright{
  right:0;border-left:1px solid rgba(196,164,107,0.5);transform:translateX(0);
}
.dleft::before,.dright::before{
  content:'';position:absolute;inset:0;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 54px,rgba(196,164,107,0.025) 54px,rgba(196,164,107,0.025) 55px),
    repeating-linear-gradient(90deg,transparent,transparent 72px,rgba(196,164,107,0.018) 72px,rgba(196,164,107,0.018) 73px);
}
.dleft::after{
  content:'';position:absolute;
  right:clamp(12px,2.5vw,40px);top:8%;bottom:8%;width:1px;
  background:linear-gradient(to bottom,transparent,rgba(196,164,107,0.6) 25%,rgba(196,164,107,0.78) 50%,rgba(196,164,107,0.6) 75%,transparent);
  box-shadow:0 0 10px rgba(196,164,107,0.22);
}
.dright::after{
  content:'';position:absolute;
  left:clamp(12px,2.5vw,40px);top:8%;bottom:8%;width:1px;
  background:linear-gradient(to bottom,transparent,rgba(196,164,107,0.6) 25%,rgba(196,164,107,0.78) 50%,rgba(196,164,107,0.6) 75%,transparent);
  box-shadow:0 0 10px rgba(196,164,107,0.22);
}
.deng{
  position:absolute;top:50%;transform:translateY(-50%);
  opacity:0.15;width:clamp(50px,7vw,110px);
}
.dleft .deng{right:clamp(22px,4vw,64px);}
.dright .deng{left:clamp(22px,4vw,64px);}
.dhandle{
  position:absolute;top:50%;transform:translateY(-50%);
  width:clamp(6px,0.9vw,13px);height:clamp(22px,3.5vw,48px);
  border:1px solid rgba(196,164,107,0.6);
  background:rgba(196,164,107,0.08);
  box-shadow:0 0 7px rgba(196,164,107,0.12);
  transition:opacity 0.3s;
}
.dleft .dhandle{right:clamp(2px,0.4vw,7px);}
.dright .dhandle{left:clamp(2px,0.4vw,7px);}
.dseam{
  position:absolute;top:0;bottom:0;left:50%;
  width:2px;transform:translateX(-50%);
  background:linear-gradient(to bottom,transparent,rgba(196,164,107,0.9) 18%,rgba(196,164,107,1) 50%,rgba(196,164,107,0.9) 82%,transparent);
  box-shadow:0 0 18px rgba(196,164,107,0.5);z-index:2;
  transition:opacity 0.35s;
}
#door.open .dleft{transform:translateX(-100%);}
#door.open .dright{transform:translateX(100%);}
#door.open .dseam{opacity:0;}
#door.open .dhandle{opacity:0;}

/* ════════════════════════════════════════
   MOBILE SWIPE HINT
════════════════════════════════════════ */
#swipe-hint{
  position:fixed;
  bottom:clamp(60px,12vh,100px);
  left:50%;transform:translateX(-50%);
  z-index:20;pointer-events:none;
  display:none;
  flex-direction:column;align-items:center;gap:6px;
  opacity:0;
  transition:opacity 0.6s;
}
#swipe-hint.show{opacity:1;}
#swipe-hint span{
  font-size:clamp(7px,1.8vw,10px);
  letter-spacing:0.3em;text-transform:uppercase;
  color:rgba(196,164,107,0.5);
  font-family:'Cormorant Garamond',serif;font-style:italic;
}
.swipe-arrows{
  display:flex;align-items:center;gap:2px;
  animation:swipeBreath 1.4s ease-in-out infinite alternate;
}
@keyframes swipeBreath{
  from{opacity:0.3;transform:translateX(-4px);}
  to{opacity:1;transform:translateX(4px);}
}
.swipe-arrows svg{width:22px;height:22px;}

/* ════════════════════════════════════════
   MOBILE SCROLL CONTAINER
════════════════════════════════════════ */
#mob-scroll{
  display:none;
  position:fixed;inset:0;
  overflow-x:scroll;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  touch-action:pan-x;
}
#mob-scroll::-webkit-scrollbar{display:none;}
#mob-canvas{
  position:relative;
  height:100%;
  width:300vw;
  /* cover the full 300vw canvas — image stretches across entire panorama */
  background:url('hall-bg.png') center center / cover no-repeat;
  background-size: 300vw 100%;
}
</style>
</head>
<body>

<!-- ARRIVAL OVERLAY -->
<div id="arrival">
  <div id="arrival-seam"></div>
</div>

<!-- GLASS DOOR -->
<div id="door">
  <div class="dseam"></div>
  <div class="dleft">
    <svg class="deng" viewBox="0 0 100 380">
      <rect x="6" y="6" width="88" height="368" fill="none" stroke="rgba(196,164,107,0.9)" stroke-width="0.5"/>
      <rect x="16" y="22" width="68" height="100" fill="none" stroke="rgba(196,164,107,0.7)" stroke-width="0.4"/>
      <line x1="50" y1="6" x2="50" y2="374" stroke="rgba(196,164,107,0.2)" stroke-width="0.4" stroke-dasharray="4,9"/>
      <circle cx="50" cy="190" r="22" fill="none" stroke="rgba(196,164,107,0.75)" stroke-width="0.5"/>
      <circle cx="50" cy="190" r="10" fill="none" stroke="rgba(196,164,107,0.5)" stroke-width="0.4"/>
      <circle cx="50" cy="190" r="3" fill="rgba(196,164,107,0.28)"/>
      <line x1="28" y1="190" x2="72" y2="190" stroke="rgba(196,164,107,0.3)" stroke-width="0.4"/>
      <line x1="50" y1="168" x2="50" y2="212" stroke="rgba(196,164,107,0.3)" stroke-width="0.4"/>
      <line x1="34" y1="174" x2="66" y2="206" stroke="rgba(196,164,107,0.12)" stroke-width="0.3"/>
      <line x1="66" y1="174" x2="34" y2="206" stroke="rgba(196,164,107,0.12)" stroke-width="0.3"/>
      <rect x="16" y="240" width="68" height="100" fill="none" stroke="rgba(196,164,107,0.5)" stroke-width="0.4"/>
      <polygon points="50,10 56,20 44,20" fill="none" stroke="rgba(196,164,107,0.55)" stroke-width="0.4"/>
      <polygon points="50,370 56,360 44,360" fill="none" stroke="rgba(196,164,107,0.55)" stroke-width="0.4"/>
    </svg>
    <div class="dhandle"></div>
  </div>
  <div class="dright">
    <svg class="deng" viewBox="0 0 100 380">
      <rect x="6" y="6" width="88" height="368" fill="none" stroke="rgba(196,164,107,0.9)" stroke-width="0.5"/>
      <rect x="16" y="22" width="68" height="100" fill="none" stroke="rgba(196,164,107,0.7)" stroke-width="0.4"/>
      <line x1="50" y1="6" x2="50" y2="374" stroke="rgba(196,164,107,0.2)" stroke-width="0.4" stroke-dasharray="4,9"/>
      <circle cx="50" cy="190" r="22" fill="none" stroke="rgba(196,164,107,0.75)" stroke-width="0.5"/>
      <circle cx="50" cy="190" r="10" fill="none" stroke="rgba(196,164,107,0.5)" stroke-width="0.4"/>
      <circle cx="50" cy="190" r="3" fill="rgba(196,164,107,0.28)"/>
      <line x1="28" y1="190" x2="72" y2="190" stroke="rgba(196,164,107,0.3)" stroke-width="0.4"/>
      <line x1="50" y1="168" x2="50" y2="212" stroke="rgba(196,164,107,0.3)" stroke-width="0.4"/>
      <line x1="34" y1="174" x2="66" y2="206" stroke="rgba(196,164,107,0.12)" stroke-width="0.3"/>
      <line x1="66" y1="174" x2="34" y2="206" stroke="rgba(196,164,107,0.12)" stroke-width="0.3"/>
      <rect x="16" y="240" width="68" height="100" fill="none" stroke="rgba(196,164,107,0.5)" stroke-width="0.4"/>
      <polygon points="50,10 56,20 44,20" fill="none" stroke="rgba(196,164,107,0.55)" stroke-width="0.4"/>
      <polygon points="50,370 56,360 44,360" fill="none" stroke="rgba(196,164,107,0.55)" stroke-width="0.4"/>
    </svg>
    <div class="dhandle"></div>
  </div>
</div>

<!-- MAIN HALL -->
<div id="hall">
  <div id="hall-bg"></div>

  <!-- Atmosphere -->
  <div id="ceiling-life"></div>
  <div id="floor-life"></div>
  <div id="portal-pulse"></div>
  <div id="dust"></div>
  <canvas id="floor-energy" style="position:absolute;inset:0;width:100%;height:100%;z-index:3;pointer-events:none;opacity:0;"></canvas>

  <!-- Hidden events -->
  <div id="hidden-observatory"></div>
  <div id="hidden-symbol">
    <svg width="clamp(30px,4vw,60px)" height="clamp(30px,4vw,60px)" viewBox="0 0 60 60" fill="none">
      <circle cx="30" cy="30" r="28" stroke="rgba(196,164,107,0.7)" stroke-width="0.5"/>
      <path d="M30 2 L30 58 M2 30 L58 30" stroke="rgba(196,164,107,0.4)" stroke-width="0.4"/>
      <circle cx="30" cy="30" r="14" stroke="rgba(196,164,107,0.5)" stroke-width="0.4"/>
      <circle cx="30" cy="30" r="4" fill="rgba(196,164,107,0.3)"/>
    </svg>

<script>
// ═══════════════════════════════════════════════════════
//  LUNARA SOCIETY — LIVING HALL v2
//  Part 1 + Part 2 Implementation
// ═══════════════════════════════════════════════════════

// ── PORTAL DATA ──────────────────────────────────────────
const PORTALS = [
  { label:'Initiation', page:'shield.html',       x:9.0,  y:43 },
  { label:'Knowledge',  page:'architecture.html', x:21.0, y:40 },
  { label:'Archives',   page:'doctrine.html',     x:32.0, y:38 },
  { label:'Legacy',     page:'registry.html',     x:68.0, y:38 },
  { label:'Society',    page:'institution.html',  x:79.0, y:40 },
  { label:'Sanctum',    page:'join.html',         x:91.0, y:43 },
];

// ── CONSOLE DATA — 8 distinct carved symbols ─────────────
const CONSOLE_DATA = [
  { label:'Knowledge', page:'architecture.html', svg:'<svg viewBox="0 0 24 24" fill="none" stroke="rgba(196,164,107,0.9)" stroke-width="1"><polygon points="12,2 20,8 17,18 7,18 4,8"/><line x1="12" y1="2" x2="12" y2="22"/><line x1="4" y1="8" x2="20" y2="8"/><line x1="7" y1="18" x2="17" y2="18"/></svg>' },
  { label:'Archives',  page:'doctrine.html',     svg:'<svg viewBox="0 0 24 24" fill="none" stroke="rgba(196,164,107,0.9)" stroke-width="1"><path d="M4 4h16v3H4z"/><path d="M4 7v13h16V7"/><path d="M9 11h6"/><path d="M9 15h4"/><path d="M6 4V2"/><path d="M18 4V2"/></svg>' },
  { label:'Legacy',    page:'registry.html',     svg:'<svg viewBox="0 0 24 24" fill="none" stroke="rgba(196,164,107,0.9)" stroke-width="1"><ellipse cx="12" cy="9" rx="5" ry="7"/><path d="M7 16c-2 1-3 2.5-3 4h16c0-1.5-1-3-3-4"/><line x1="9" y1="5" x2="7" y2="3"/><line x1="15" y1="5" x2="17" y2="3"/></svg>' },
  { label:'Society',   page:'institution.html',  svg:'<svg viewBox="0 0 24 24" fill="none" stroke="rgba(196,164,107,0.9)" stroke-width="1"><circle cx="12" cy="12" r="9"/><path d="M12 3c-2.5 3-4 5.5-4 9s1.5 6 4 9"/><path d="M12 3c2.5 3 4 5.5 4 9s-1.5 6-4 9"/><line x1="3" y1="12" x2="21" y2="12"/></svg>' },
  { label:'Membership',page:'member.html',       svg:'<svg viewBox="0 0 24 24" fill="none" stroke="rgba(196,164,107,0.9)" stroke-width="1"><rect x="3" y="6" width="18" height="13" rx="1"/><path d="M3 10h18"/><circle cx="8" cy="15" r="1.5"/><path d="M13 15h5"/><path d="M13 13h3"/></svg>' },
  { label:'Events',    page:'signal.html',       svg:'<svg viewBox="0 0 24 24" fill="none" stroke="rgba(196,164,107,0.9)" stroke-width="1"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.9" y1="4.9" x2="7.1" y2="7.1"/><line x1="16.9" y1="16.9" x2="19.1" y2="19.1"/><line x1="4.9" y1="19.1" x2="7.1" y2="16.9"/><line x1="16.9" y1="7.1" x2="19.1" y2="4.9"/></svg>' },
  { label:'Journal',   page:'gateway.html',      svg:'<svg viewBox="0 0 24 24" fill="none" stroke="rgba(196,164,107,0.9)" stroke-width="1"><path d="M4 4h16v16H4z"/><path d="M8 4v16"/><path d="M12 8h4"/><path d="M12 12h4"/><path d="M12 16h2"/></svg>' },
  { label:'Contact',   page:'contact.html',      svg:'<svg viewBox="0 0 24 24" fill="none" stroke="rgba(196,164,107,0.9)" stroke-width="1"><circle cx="12" cy="12" r="9"/><line x1="12" y1="3" x2="12" y2="21"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="12" y1="3" x2="17" y2="8"/><line x1="12" y1="3" x2="7" y2="8"/></svg>' },
];

// ── DEVICE DETECTION ─────────────────────────────────────
const isMob = () => {
  // Portrait mobile: width < 900 AND taller than wide
  return window.innerWidth < 900 && window.innerHeight > window.innerWidth;
};

// ── BUILD PORTALS ─────────────────────────────────────────
function buildPortals(layerId, xFn, yFn){
  const layer = document.getElementById(layerId);
  if(!layer) return;
  layer.innerHTML = '';
  PORTALS.forEach(p => {
    const el = document.createElement('div');
    el.className = 'portal';
    el.style.cssText = `left:${xFn(p.x)};top:${yFn(p.y)};pointer-events:all;`;
    el.innerHTML = `<div class="portal-hit">
      <span class="portal-label">${p.label}</span>
      <div class="portal-ring"></div>
    </div>`;
    el.addEventListener('click',   () => navigate(p.page));
    el.addEventListener('touchend', e => { e.preventDefault(); navigate(p.page); });
    layer.appendChild(el);
  });
}

// ── BUILD CONSOLE ─────────────────────────────────────────
function buildConsole(innerId){
  const el = document.getElementById(innerId);
  if(!el) return;
  el.innerHTML = '';
  CONSOLE_DATA.forEach(b => {
    const d = document.createElement('div');
    d.className = 'cbtn';
    d.innerHTML = `<div class="cicon">${b.svg}</div><span class="clabel">${b.label}</span>`;
    d.addEventListener('click',    () => navigate(b.page));
    d.addEventListener('touchend', e => { e.preventDefault(); navigate(b.page); });
    el.appendChild(d);
  });
}

// ── ELEVATOR DOOR NAVIGATION ──────────────────────────────
const door = document.getElementById('door');
let busy = false;

function navigate(targetPage){
  if(busy) return;
  busy = true;
  // Floor energy pulse toward selected portal
  triggerFloorEnergy();
  // Snap door closed
  door.classList.remove('open');
  door.classList.add('armed');
  // Load destination
  const ifr = document.createElement('iframe');
  ifr.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;border:none;z-index:760;opacity:0;pointer-events:none;';
  document.body.appendChild(ifr);
  let gone = false;
  function depart(){ if(gone)return; gone=true; clearTimeout(fb); setTimeout(()=>{ door.classList.add('open'); setTimeout(()=>{ window.location.href=targetPage; },1100); },160); }
  const fb = setTimeout(depart, 2800);
  ifr.onload = depart;
  ifr.src = targetPage;
}

// ── FLOOR ENERGY CANVAS ───────────────────────────────────
function triggerFloorEnergy(){
  const c = document.getElementById('floor-energy');
  if(!c) return;
  const ctx = c.getContext('2d');
  c.width = c.offsetWidth; c.height = c.offsetHeight;
  c.style.opacity = '1';
  let prog = 0;
  const cx = c.width/2, cy = c.height;
  const draw = () => {
    ctx.clearRect(0,0,c.width,c.height);
    prog = Math.min(prog + 0.018, 1);
    const len = prog * (c.height * 0.35);
    const grad = ctx.createLinearGradient(cx, cy, cx, cy - len);
    grad.addColorStop(0,'rgba(196,164,107,0)');
    grad.addColorStop(0.5,'rgba(196,164,107,0.22)');
    grad.addColorStop(1,'rgba(196,164,107,0)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx, cy - len);
    ctx.stroke();
    // Side tendrils
    const tLen = len * 0.4;
    [-1,1].forEach(dir => {
      const tGrad = ctx.createLinearGradient(cx, cy - len*0.3, cx + dir*tLen*0.6, cy - len*0.3 - tLen*0.5);
      tGrad.addColorStop(0,'rgba(196,164,107,0.12)');
      tGrad.addColorStop(1,'rgba(196,164,107,0)');
      ctx.strokeStyle = tGrad;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(cx, cy - len*0.3);
      ctx.lineTo(cx + dir*tLen*0.6, cy - len*0.3 - tLen*0.5);
      ctx.stroke();
    });
    if(prog < 1) requestAnimationFrame(draw);
    else setTimeout(()=>{ c.style.opacity='0'; ctx.clearRect(0,0,c.width,c.height); },600);
  };
  requestAnimationFrame(draw);
}

// ── DUST MOTES ────────────────────────────────────────────
function spawnDust(){
  const container = document.getElementById('dust');
  if(!container) return;
  // Only 3-5 motes at a time, very sparse
  const count = 3 + Math.floor(Math.random()*3);
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      const m = document.createElement('div');
      m.className = 'mote';
      // Place inside a light shaft (center 20-60% x, top 10-40% y)
      m.style.left = (20 + Math.random()*40)+'%';
      m.style.top  = (10 + Math.random()*30)+'%';
      container.appendChild(m);
      // Slow float upward
      const dur = 8000 + Math.random()*6000;
      m.animate([
        {opacity:0, transform:'translateY(0px)'},
        {opacity:0.6, transform:'translateY(-'+Math.round(40+Math.random()*60)+'px)', offset:0.3},
        {opacity:0, transform:'translateY(-'+Math.round(80+Math.random()*80)+'px)'}
      ],{duration:dur,easing:'linear',fill:'forwards'}).onfinish = ()=>m.remove();
    }, i * 1400 + Math.random()*800);
  }
}

// ── CAMERA BREATHING ──────────────────────────────────────
// Very subtle. Center-aimed. Slow breathing + tiny vertical drift.
let camT = 0;
let camReduced = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
function cameraTick(){
  if(camReduced) return;
  camT += 0.00025;
  const bg = document.getElementById('hall-bg');
  if(!bg) return;
  // Horizontal: tiny left-right
  const hx = Math.sin(camT * 0.7) * 0.18;  // ±0.18%
  const vy = Math.sin(camT * 0.4) * 0.12;   // ±0.12%
  // Subtle scale breath
  const sc = 1 + Math.sin(camT * 0.55) * 0.003;
  bg.style.transform = `translate(${hx}%, ${vy}%) scale(${sc})`;
  requestAnimationFrame(cameraTick);
}

// ── CURSOR PARALLAX (desktop) ─────────────────────────────
let mouseX = 0.5, mouseY = 0.5;
let targetX = 0.5, targetY = 0.5;
document.addEventListener('mousemove', e => {
  mouseX = e.clientX / window.innerWidth;
  mouseY = e.clientY / window.innerHeight;
});
function parallaxTick(){
  if(camReduced){ requestAnimationFrame(parallaxTick); return; }
  targetX += (mouseX - targetX) * 0.04;
  targetY += (mouseY - targetY) * 0.04;
  const ceilEl  = document.getElementById('ceiling-life');
  const floorEl = document.getElementById('floor-life');
  if(ceilEl)  ceilEl.style.transform  = `translateX(calc(-50% + ${(targetX-0.5)*-6}px))`;
  if(floorEl) floorEl.style.transform = `translateX(calc(-50% + ${(targetX-0.5)*4}px))`;
  requestAnimationFrame(parallaxTick);
}

// ── HIDDEN EVENTS ─────────────────────────────────────────
function scheduleHiddenEvents(){
  // 2 min: observatory flickers
  setTimeout(()=>{
    const el = document.getElementById('hidden-observatory');
    if(!el) return;
    el.style.transition = 'opacity 3s ease'; el.style.opacity='1';
    setTimeout(()=>{ el.style.opacity='0'; }, 4000);
  }, 120000);

  // 8 min: hidden symbol reveals
  setTimeout(()=>{
    const el = document.getElementById('hidden-symbol');
    if(!el) return;
    el.style.transition='opacity 6s ease'; el.style.opacity='0.18';
    setTimeout(()=>{ el.style.opacity='0'; }, 12000);
  }, 480000);

  // 10 min: sealed doorway light
  setTimeout(()=>{
    const el = document.getElementById('hidden-doorway');
    if(!el) return;
    el.style.transition='opacity 4s ease'; el.style.opacity='1';
    setTimeout(()=>{ el.style.opacity='0'; }, 8000);
  }, 600000);
}

// ── CONSOLE RISE ─────────────────────────────────────────
// After 2s: hairline seams appear. Stone separates. Console rises.
function riseConsole(){
  const wrap = document.getElementById('console-wrap');
  const footer = document.getElementById('footer-strip');
  if(!wrap) return;
  wrap.style.transition = 'transform 2.1s cubic-bezier(0.22,1,0.36,1)';
  wrap.style.transform  = 'translateY(0)';
  if(footer){
    footer.style.transition = 'opacity 1.4s ease';
    footer.style.opacity = '1';
  }
}

// ── ARRIVAL SEQUENCE ─────────────────────────────────────
function runArrival(){
  const arrival = document.getElementById('arrival');
  const seam    = document.getElementById('arrival-seam');
  const hall    = document.getElementById('hall');
  const insc    = document.getElementById('inscription');
  const ceil    = document.getElementById('ceiling-life');
  const floor   = document.getElementById('floor-life');
  const pulse   = document.getElementById('portal-pulse');
  const marks   = document.querySelectorAll('.mark');

  // 0.0s — black. Silence.
  // 0.5s — faint golden seam appears
  setTimeout(()=>{
    seam.style.transition = 'opacity 0.8s ease, transform 1.8s ease';
    seam.style.opacity = '1';
    seam.style.transform = 'translate(-50%,-50%) scaleX(1)';
  }, 500);

  // 1.5s — hall begins emerging from darkness
  setTimeout(()=>{
    hall.style.transition = 'opacity 2.2s cubic-bezier(0.4,0,0.2,1)';
    hall.style.opacity = '1';
  }, 1500);

  // 2.5s — arrival overlay fades, revealing reflections
  setTimeout(()=>{
    arrival.style.opacity = '0';
    arrival.style.pointerEvents = 'none';
  }, 2500);

  // 3.0s — console rises from marble
  setTimeout(() => {
    arrival.style.pointerEvents = 'none';
    riseConsole();
  }, 3000);

  // 3.5s — ceiling glow begins
  setTimeout(()=>{
    ceil.style.transition = 'opacity 3s ease';
    ceil.style.opacity = '1';
  }, 3500);

  // 4.5s — central portal first soft pulse
  setTimeout(()=>{
    pulse.style.transition = 'opacity 1.5s ease, transform 4s ease';
    pulse.style.opacity = '0.8';
    pulse.style.transform = 'translate(-50%,-60%) scale(1.3)';
    setTimeout(()=>{
      pulse.style.opacity = '0.2';
      pulse.style.transform = 'translate(-50%,-60%) scale(1)';
    }, 2000);
  }, 4500);

  // 5.0s — inscription + marks appear. Hall at rest.
  setTimeout(()=>{
    if(insc){ insc.style.transition='opacity 2s ease'; insc.style.opacity='1'; }
    marks.forEach(m=>{ m.style.transition='opacity 2s ease'; m.style.opacity='1'; });
    // Floor life
    floor.style.transition = 'opacity 4s ease';
    floor.style.opacity = '0.8';
  }, 5000);

  // 6s — camera breathing begins
  setTimeout(()=>{ cameraTick(); }, 6000);

  // 7s — first dust motes
  setTimeout(()=>{
    spawnDust();
    setInterval(spawnDust, 22000 + Math.random()*8000);
  }, 7000);

  // 20s — floor reflections deepen
  setTimeout(()=>{
    floor.style.opacity = '1';
  }, 20000);

  // 60s+ ongoing: subtle periodic ceiling pulse (rare)
  setInterval(()=>{
    if(Math.random() > 0.7){
      ceil.style.transition = 'opacity 8s ease';
      ceil.style.opacity = String(0.5 + Math.random()*0.5);
      setTimeout(()=>{ ceil.style.opacity='0.6'; }, 10000);
    }
  }, 35000);
}

// ── MOBILE INIT ───────────────────────────────────────────
function initMobile(){
  // Hide desktop elements
  var hallEl = document.getElementById('hall');
  if(hallEl) hallEl.style.display = 'none';
  // Hide arrival overlay — not used for mobile
  var arrEl = document.getElementById('arrival');
  if(arrEl){ arrEl.style.opacity='0'; arrEl.style.pointerEvents='none'; }
  const ms = document.getElementById('mob-scroll');
  ms.style.display = 'block';

  buildPortals('mob-portal-layer',
    x => `${x}%`,
    y => `${y}vh`
  );
  buildConsole('mob-console-inner');

  // Swipe hint
  const hint = document.getElementById('swipe-hint');
  hint.style.display = 'flex';
  setTimeout(()=>{ hint.classList.add('show'); }, 800);
  setTimeout(()=>{ hint.classList.remove('show'); }, 5800);
  setTimeout(()=>{ hint.style.display='none'; }, 6600);

  // Re-show hint if idle >60s without scrolling
  let scrolled = false;
  ms.addEventListener('scroll',()=>{ scrolled=true; }, {once:true, passive:true});
  setTimeout(()=>{
    if(!scrolled){
      hint.style.display='flex';
      setTimeout(()=>{ hint.classList.add('show'); },100);
      setTimeout(()=>{ hint.classList.remove('show'); hint.style.display='none'; },5500);
    }
  }, 65000);

  // Fade in mobile — show immediately, no opacity trick needed
  var ms2 = document.getElementById('mob-scroll');
  if(ms2){ ms2.style.opacity='1'; }
}

// ── DESKTOP INIT ──────────────────────────────────────────
function initDesktop(){
  var ms = document.getElementById('mob-scroll');
  var h  = document.getElementById('hall');
  if(ms) ms.style.display = 'none';
  if(h)  h.style.display  = 'block';
  buildPortals('portal-layer', x=>`${x}%`, y=>`${y}%`);
  buildConsole('console-inner');
  parallaxTick();
  runArrival();
  scheduleHiddenEvents();
}

// ── INIT ──────────────────────────────────────────────────
function init(){
  // Reset door on hall load
  door.classList.remove('armed','open');
  busy = false;
  if(isMob()) initMobile();
  else        initDesktop();
}

// Use load (not DOMContentLoaded) so image is ready before sequence starts
window.addEventListener('load', function(){
  try { init(); } catch(e){ emergencyReveal(); console.error('Hall init error:',e); }
});
window.addEventListener('resize',           ()=>{ if(!busy){ try{init();}catch(e){} } });
window.addEventListener('orientationchange',()=>{ setTimeout(()=>{ if(!busy){ try{init();}catch(e){} } },350); });

// Emergency fallback — if anything fails, just show the hall
function emergencyReveal(){
  var a = document.getElementById('arrival');
  var h = document.getElementById('hall');
  if(a){ a.style.transition='opacity 1.2s ease'; a.style.opacity='0'; setTimeout(()=>{a.style.pointerEvents='none';},1300); }
  if(h){ h.style.transition='opacity 1.2s ease'; h.style.opacity='1'; }
  var cw = document.getElementById('console-wrap');
  if(cw){ cw.style.transition='transform 1.2s ease'; cw.style.transform='translateY(0)'; }
  var insc = document.getElementById('inscription');
  if(insc){ insc.style.transition='opacity 1.2s ease'; insc.style.opacity='1'; }
  document.querySelectorAll('.mark').forEach(m=>{ m.style.opacity='1'; });
}
</script>
